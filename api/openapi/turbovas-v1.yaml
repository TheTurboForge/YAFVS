          type: string
        name:
          type: string
        comment:
          type: string
        title:
          type: string
        summary:
          type: string
        severity:
          type: number
        cve_refs:
          type: integer
        cves:
          type: array
          items:
            type: string
            pattern: '^CVE-[0-9]{4}-[0-9]{4,}$'
        created_at:
          type: string
          format: date-time
        modified_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CertBundAdvisory:
      type: object
      required: [id, name, cve_refs]
