name: openvasd-community-edition-tls

services:
  configure-openvas:
    image: ${OPENVAS_IMAGE:-ghcr.io/greenbone/openvas-scanner:stable}
    volumes:
      - openvas_data_vol:/mnt
    command:
      - /bin/sh
      - -c
      - |
        # This standalone openvasd fixture has no authenticated MQTT/Notus
        # pipeline, so table-driven LSC remains disabled.
        printf "table_driven_lsc = no\n" > /mnt/openvas.conf
        chmod 644 /mnt/openvas.conf

  openvasd:
    environment:
      TLS_CERTS: /var/lib/openvasd/certs/server.pem
      TLS_KEY: /var/lib/openvasd/certs/server.key
      TLS_CLIENT_CERTS: /var/lib/openvasd/certs/clients/
    volumes:
      - ${OPENVASD_CERTS:-./certs}:/var/lib/openvasd/certs:ro,z
