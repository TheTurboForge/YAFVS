          type: string
          format: uuid
        name:
          type: string
        comment:
          type: string
        value:
          type: string
    UserSettingUpdateRequest:
      type: object
      additionalProperties: false
      required: [value]
      properties:
        value:
          oneOf:
            - type: string
              maxLength: 32768
            - type: number
          description: Replacement value. Its UTF-8 string representation must not exceed 32768 bytes or contain NUL characters.
    CurrentUserPasswordChangeRequest:
      type: object
      additionalProperties: false
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          minLength: 1
          maxLength: 4096
          writeOnly: true
          description: Current local password. Its UTF-8 encoding must not exceed 4096 bytes and must not contain control characters.
        new_password:
          type: string
          minLength: 1
          maxLength: 4096
          writeOnly: true
          description: Replacement local password. Its UTF-8 encoding must not exceed 4096 bytes and must not contain control characters.
    ScanConfigAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScanConfigAsset'
    ScanConfigTaskReference:
