---
rules:
  - id: turbovas.native-api.subprocess-spawn
    languages: [rust]
    severity: ERROR
    message: Native API code must not spawn subprocesses; keep runtime control in explicit helpers.
    paths:
      include:
        - /services/turbovas-api/src/**/*.rs
    pattern-either:
      - pattern: std::process::Command::new(...)
      - pattern: tokio::process::Command::new(...)
      - pattern: Command::new(...)

  - id: turbovas.native-api.unsafe-rust
    languages: [rust]
    severity: ERROR
    message: Native API code must not use unsafe Rust without a deliberate security review.
    paths:
      include:
        - /services/turbovas-api/src/**/*.rs
    pattern-either:
      - pattern: unsafe { ... }
      - pattern: unsafe fn $FUNC(...) { ... }

  - id: turbovas.native-api.dynamic-sql-format
    languages: [rust]
    severity: ERROR
    message: Avoid format!-built SQL in native API PostgreSQL calls; use static SQL with bind parameters.
    paths:
      include:
        - /services/turbovas-api/src/**/*.rs
    pattern-either:
      - pattern: $CLIENT.query(&format!(...), ...)
      - pattern: $CLIENT.query(format!(...).as_str(), ...)
      - pattern: $CLIENT.query_one(&format!(...), ...)
      - pattern: $CLIENT.query_one(format!(...).as_str(), ...)
      - pattern: $CLIENT.query_opt(&format!(...), ...)
      - pattern: $CLIENT.query_opt(format!(...).as_str(), ...)
      - pattern: $CLIENT.query_raw(&format!(...), ...)
      - pattern: $CLIENT.query_raw(format!(...).as_str(), ...)
      - pattern: $CLIENT.execute(&format!(...), ...)
      - pattern: $CLIENT.execute(format!(...).as_str(), ...)
      - pattern: $CLIENT.batch_execute(&format!(...))
      - pattern: $CLIENT.batch_execute(format!(...).as_str())
      - pattern: $CLIENT.simple_query(&format!(...))
      - pattern: $CLIENT.simple_query(format!(...).as_str())
      - pattern: $CLIENT.prepare(&format!(...))
      - pattern: $CLIENT.prepare(format!(...).as_str())
      - pattern: $CLIENT.prepare_typed(&format!(...), ...)
      - pattern: $CLIENT.prepare_typed(format!(...).as_str(), ...)
