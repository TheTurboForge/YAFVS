      required: [id, name, usage_type]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        usage_type:
          type: string
          enum: [scan]
    ScanConfigAssetDetail:
      allOf:
        - $ref: '#/components/schemas/ScanConfigAsset'
        - type: object
          required: [preferences]
          properties:
            preferences:
              $ref: '#/components/schemas/ScanConfigPreferences'
            tasks:
              type: array
              description: Non-hidden task backlinks that use this scan config. Task control remains inherited.
              items:
                $ref: '#/components/schemas/ScanConfigTaskReference'
            user_tags:
              type: array
              description: Active user tags attached directly to this scan config. Assignment uses the separate native tag contract.
              items:
                $ref: '#/components/schemas/ReportUserTag'
    ScanConfigPreferences:
      type: object
      additionalProperties: false
      required: [scanner, nvt]
      properties:
        scanner:
          type: array
          items:
            $ref: '#/components/schemas/ScanConfigScannerPreference'
        nvt:
          type: array
          items:
            $ref: '#/components/schemas/ScanConfigNvtPreference'
    ScanConfigScannerPreference:
      type: object
      additionalProperties: false
      required: [name, value, default, configured, redacted]
      properties:
        name:
          type: string
        value:
          type: string
        default:
          type: string
        configured:
          type: boolean
          description: True when this scan config has an explicit override row for the preference. For redacted values, clients use this flag to distinguish configured/keep from unset without receiving the secret.
        redacted:
          type: boolean
          description: True when a sensitive value/default was replaced with empty strings.
    ScanConfigPreferenceNvt:
      type: object
      additionalProperties: false
      required: [oid, name]
      properties:
        oid:
          type: string
        name:
          type: string
    ScanConfigNvtPreference:
      type: object
      additionalProperties: false
      required: [nvt, id, name, hr_name, type, value, default, configured, redacted]
      properties:
        nvt:
          $ref: '#/components/schemas/ScanConfigPreferenceNvt'
        id:
          type: integer
          format: int32
          minimum: 0
        name:
          type: string
        hr_name:
          type: string
        type:
          type: string
        value:
          type: string
        default:
          type: string
        configured:
          type: boolean
          description: True when this scan config has an explicit override row matching the feed preference. For redacted values, clients use this flag to distinguish configured/keep from unset without receiving the secret.
        redacted:
          type: boolean
          description: True for password and file preferences; value and default are then empty strings.
    ScanConfigBackupDocument:
      type: object
      additionalProperties: false
      required: [schema, version, usage_type, name, comment, families_growing, family_inventory, selectors, preferences, omitted_secret_preference_count, omitted_secret_preferences]
      description: Versioned portable scan-config JSON. Source identity, ownership, timestamps, task/tag links, predefined state, and all password/file values/defaults are intentionally absent.
      properties:
        schema:
          type: string
          enum: [yafvs.scan-config-backup]
        version:
          type: integer
          enum: [1]
        usage_type:
          type: string
          enum: [scan]
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        families_growing:
          type: boolean
        family_inventory:
          type: array
          maxItems: 512
          description: Exact current nonempty, non-Credentials feed-family inventory. Import rejects a changed inventory rather than applying a stale selector snapshot.
          items:
            type: string
            minLength: 1
            maxLength: 256
        selectors:
          type: array
          maxItems: 16384
          items:
            $ref: '#/components/schemas/ScanConfigBackupSelector'
        preferences:
          type: array
          maxItems: 4096
          description: Explicit configured non-password/non-file preference overrides only. Defaults are never serialized.
          items:
            $ref: '#/components/schemas/ScanConfigBackupPreference'
        omitted_secret_preference_count:
          type: integer
          minimum: 0
        omitted_secret_preferences:
          type: array
          maxItems: 4096
          description: Explicit configured password/file preference identities without values or defaults. Import validates these identities and does not write an override.
          items:
            $ref: '#/components/schemas/ScanConfigBackupPreferenceIdentity'
    ScanConfigBackupSelector:
      type: object
      additionalProperties: false
      required: [type, exclude, family_or_nvt]
      properties:
        type:
          type: integer
          enum: [1, 2]
        exclude:
          type: boolean
        family_or_nvt:
          type: string
          minLength: 1
          maxLength: 256
        family:
          type: string
          minLength: 1
          maxLength: 256
          description: Required only for type 2 NVT rows and omitted for type 1 family rows.
      description: Canonical selector row. Type 1 rows are family exceptions with family omitted; type 2 rows identify an NVT plus its current feed family and have the exclusion required by that family mode.
    ScanConfigBackupPreference:
      type: object
      additionalProperties: false
      required: [scope, name, value]
      properties:
        scope:
          type: string
          enum: [scanner, nvt]
        name:
          type: string
          minLength: 1
          maxLength: 4096
        nvt:
          $ref: '#/components/schemas/ScanConfigPreferenceNvtIdentity'
        value:
          type: string
          maxLength: 196608
          x-yafvs-max-bytes: 196608
    ScanConfigBackupPreferenceIdentity:
      type: object
      additionalProperties: false
      required: [scope, name]
      properties:
        scope:
          type: string
          enum: [scanner, nvt]
        name:
          type: string
          minLength: 1
          maxLength: 4096
        nvt:
          $ref: '#/components/schemas/ScanConfigPreferenceNvtIdentity'
      description: Scanner identities omit nvt. NVT identities require the exact current feed-owned OID, preference id, type, and name identity.
    FilterAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/FilterAsset'
    AlertAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/AlertAsset'
