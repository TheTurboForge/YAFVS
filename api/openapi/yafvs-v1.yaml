          type: string
          minLength: 1
          maxLength: 255
        text:
          type: string
          maxLength: 8192
        hosts:
          type: [string, 'null']
          maxLength: 4096
        port:
          type: [string, 'null']
          maxLength: 512
        severity:
          type: [number, 'null']
          minimum: 0
          maximum: 10
        new_severity:
          type: [number, 'null']
          minimum: -1
          maximum: 10
        task_id:
