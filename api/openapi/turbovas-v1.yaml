openapi: 3.1.0
info:
  title: TurboVAS Native API
  version: 0.1.0-contract
  description: Contract baseline for DB-backed TurboVAS product workflows. Current live operations are read-focused; future write/control operations must carry explicit safety metadata before replacing inherited GMP/XML paths. Direct listener responses include X-Request-Id for correlation.
servers:
  - url: /api/v1
  - url: http://127.0.0.1:19080/api/v1
    description: Opt-in development direct API listener; requires bearer authentication.
security:
  - operatorSession: []
  - bearerAuth: []
paths:
  /results:
    get:
      operationId: getResults
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: result-list-and-effective-overrides-read
      x-turbovas-inherited-still-owns: result-tags-exports-and-actions
      summary: List top-level scan results
      description: Read-only scan result list backed by gvmd/PostgreSQL. Rows include page-bounded effective override metadata for display; result tag mutation, exports, and actions remain on inherited compatibility paths.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Result collection across raw scan reports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /results/{result_id}:
    get:
      operationId: getResultsByResultId
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: result-detail-metadata-tags-and-overrides-read
      x-turbovas-inherited-still-owns: result-exports-and-actions
      summary: Read one scan result metadata row
      description: Read-only raw result detail backed by gvmd/PostgreSQL. Native detail includes result/NVT explanatory text, NVT-level EPSS context, active result user tags, and effective active override metadata for display. Inherited paths still own exports, actions, create-override, and override/tag mutation workflows.
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: Result metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /vulnerabilities:
    get:
      operationId: getVulnerabilities
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: vulnerability-list-read
      x-turbovas-inherited-still-owns: vulnerability-exports-and-actions
      summary: List top-level vulnerabilities from scan results
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Vulnerability collection aggregated from positive-severity raw scan results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnerabilityCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cves:
    get:
      operationId: getCves
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: cve-catalog-list-read
      x-turbovas-inherited-still-owns: scap-rich-context
      summary: List Security Information CVEs
      description: Searchable CVE intelligence catalog backed by SCAP feed metadata in gvmd/PostgreSQL. This is distinct from observed report CVEs and vulnerability findings.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: CVE catalog collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCveCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cves/{cve_id}:
    get:
      operationId: getCvesByCveId
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: cve-catalog-detail-epss-reference-configuration-read
      x-turbovas-inherited-still-owns: scap-rich-context
      summary: Read one Security Information CVE
      description: Read-only CVE catalog detail backed by gvmd/PostgreSQL. Native detail includes EPSS score/percentile, URL/tag references, CERT advisory and NVT references, and SCAP configuration nodes for display. Export and remaining rich/raw SCAP context stay inherited.
      parameters:
        - $ref: '#/components/parameters/CveId'
      responses:
        '200':
          description: CVE catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCveDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cves/{cve_id}/export:
    get:
      operationId: getCvesByCveIdExport
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: cve-catalog-metadata-export-read
      x-turbovas-inherited-still-owns: scap-rich-context
      summary: Export one Security Information CVE as native JSON metadata
      description: Direct scriptable CVE catalog metadata export backed by gvmd/PostgreSQL. This returns the same read-only native detail JSON as the CVE detail endpoint, including EPSS, references, CERT/NVT links, SCAP configuration nodes, and user tags. Raw/rich SCAP feed context remains inherited.
      parameters:
        - $ref: '#/components/parameters/CveId'
      responses:
        '200':
          description: CVE catalog metadata export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCveDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cpes:
    get:
      operationId: getCpes
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: cpe-catalog-list-read
      x-turbovas-inherited-still-owns: scap-rich-context
      summary: List Security Information CPEs
      description: Searchable CPE intelligence catalog backed by SCAP feed metadata in gvmd/PostgreSQL. This is distinct from observed operating-system and application evidence in raw and scope reports.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: CPE catalog collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCpeCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cpes/{cpe_id}:
    get:
      operationId: getCpesByCpeId
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: cpe-catalog-detail-read
      x-turbovas-inherited-still-owns: scap-rich-context
      summary: Read one Security Information CPE
      description: Read-only CPE catalog detail backed by SCAP feed metadata in gvmd/PostgreSQL. Native detail includes normalized CVE references, deprecation metadata, user tags, and bounded SCAP reference URLs extracted from feed detail XML. Export and remaining rich/raw SCAP context stay inherited.
      parameters:
        - $ref: '#/components/parameters/CpeId'
      responses:
        '200':
          description: CPE catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCpeDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cert-bund-advisories:
    get:
      operationId: getCertBundAdvisories
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: cert-bund-advisory-list-read
      x-turbovas-inherited-still-owns: cert-advisory-rich-detail-export
      summary: List Security Information CERT-Bund advisories
      description: Searchable CERT-Bund advisory list backed by CERT feed metadata already imported into gvmd/PostgreSQL. Rich advisory detail remains inherited from feed XML/XSLT.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: CERT-Bund advisory collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertBundAdvisoryCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cert-bund-advisories/{cert_bund_advisory_id}:
    get:
      operationId: getCertBundAdvisoriesByCertBundAdvisoryId
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: cert-bund-advisory-catalog-detail-read
      x-turbovas-inherited-still-owns: cert-advisory-rich-detail-export
      summary: Read one Security Information CERT-Bund advisory catalog entry
      description: Catalog-detail metadata backed by CERT feed metadata already imported into gvmd/PostgreSQL. This endpoint intentionally does not reconstruct XML-only rich advisory fields such as revision history, platform, risk, reference URLs, or description blocks.
      parameters:
        - $ref: '#/components/parameters/CertBundAdvisoryId'
      responses:
        '200':
          description: CERT-Bund advisory catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertBundAdvisoryDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /dfn-cert-advisories:
    get:
      operationId: getDfnCertAdvisories
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: dfn-cert-advisory-list-read
      x-turbovas-inherited-still-owns: cert-advisory-rich-detail-export
      summary: List Security Information DFN-CERT advisories
      description: Searchable DFN-CERT advisory list backed by CERT feed metadata already imported into gvmd/PostgreSQL. Rich advisory detail remains inherited from feed XML/XSLT.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: DFN-CERT advisory collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DfnCertAdvisoryCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /dfn-cert-advisories/{dfn_cert_advisory_id}:
    get:
      operationId: getDfnCertAdvisoriesByDfnCertAdvisoryId
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: dfn-cert-advisory-catalog-detail-read
      x-turbovas-inherited-still-owns: cert-advisory-rich-detail-export
      summary: Read one Security Information DFN-CERT advisory catalog entry
      description: Catalog-detail metadata backed by CERT feed metadata already imported into gvmd/PostgreSQL. This endpoint intentionally does not reconstruct XML-only rich advisory fields such as advisory links or additional feed links.
      parameters:
        - $ref: '#/components/parameters/DfnCertAdvisoryId'
      responses:
        '200':
          description: DFN-CERT advisory catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DfnCertAdvisoryDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /nvts:
    get:
      operationId: getNvts
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: nvt-catalog-list-read
      x-turbovas-inherited-still-owns: nvt-rich-detail
      summary: List Security Information NVTs
      description: Searchable NVT catalog backed by gvmd/PostgreSQL feed metadata. This list contract is intentionally separate from rich NVT detail, preferences, and export behavior, which remain inherited until a separate typed contract is designed.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: NVT catalog collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NvtCatalogCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /nvts/{nvt_id}:
    get:
      operationId: getNvtsByNvtId
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: nvt-catalog-detail-read
      x-turbovas-inherited-still-owns: nvt-rich-detail
      summary: Read one Security Information NVT catalog entry
      description: Catalog-detail metadata backed by NVT feed metadata already imported into gvmd/PostgreSQL. This endpoint uses NVT numeric dotted OIDs and intentionally excludes preferences, selector/config expansion, export, feed-control, scanner-control, and write semantics.
      parameters:
        - $ref: '#/components/parameters/NvtId'
      responses:
        '200':
          description: NVT catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NvtCatalogDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /nvts/{nvt_id}/export:
    get:
      operationId: getNvtsByNvtIdExport
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: nvt-catalog-metadata-export-read
      x-turbovas-inherited-still-owns: nvt-rich-detail
      summary: Export one Security Information NVT as native JSON metadata
      description: Direct scriptable NVT catalog metadata export backed by gvmd/PostgreSQL. This returns the same read-only native detail JSON as the NVT detail endpoint. Rich NVT detail, preference/config expansion, file export, scanner/feed control, and write semantics remain inherited.
      parameters:
        - $ref: '#/components/parameters/NvtId'
      responses:
        '200':
          description: NVT catalog metadata export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NvtCatalogDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /operating-systems:
    get:
      operationId: getOperatingSystems
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: operating-system-asset-list-read
      x-turbovas-inherited-still-owns: operating-system-writes-deletes-and-rich-history
      summary: List top-level operating-system assets
      description: Inherited asset view backed by gvmd/PostgreSQL operating-system evidence, distinct from report operating-system evidence tabs.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Operating-system asset collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatingSystemAssetCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /operating-systems/{os_id}:
    get:
      operationId: getOperatingSystemsByOsId
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: operating-system-asset-detail-info-read
      x-turbovas-inherited-still-owns: operating-system-writes-deletes-and-rich-history
      summary: Read one top-level operating-system asset
      description: Read-only asset metadata backed by gvmd/PostgreSQL `oss` records, associated host operating-system evidence, host details, and host severity state. This endpoint does not expose export, delete, scanner-control, feed-control, or write behavior.
      parameters:
        - $ref: '#/components/parameters/OperatingSystemId'
      responses:
        '200':
          description: Operating-system asset detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatingSystemAsset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /operating-systems/{os_id}/export:
    get:
      operationId: getOperatingSystemsByOsIdExport
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: live-read
      x-turbovas-replaces: operating-system-asset-metadata-export-read
      x-turbovas-inherited-still-owns: operating-system-writes-deletes-and-rich-history
      summary: Export operating-system metadata JSON
      description: Direct scriptable operating-system metadata export backed by gvmd/PostgreSQL. This returns the same native operating-system detail JSON with aggregate host/severity metadata and active user tags. Operating-system writes, deletes, export, tag writes/actions, and richer history remain inherited.
      parameters:
        - $ref: '#/components/parameters/OperatingSystemId'
      responses:
        '200':
          description: Operating-system metadata export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatingSystemAsset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /hosts:
    get:
      operationId: getHosts
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
