          maxLength: 4096
          x-yafvs-max-bytes: 4096
        active:
          type: boolean
        status:
          type: string
          maxLength: 32
          x-yafvs-max-bytes: 32
          enum: [Delete Requested, Ultimate Delete Requested, Ultimate Delete Waiting, Delete Waiting, Done, New, Requested, Running, Queued, Stop Requested, Stop Waiting, Stopped, Processing, Interrupted]
        scp_credential_id:
          type: string
          format: uuid
          maxLength: 36
          x-yafvs-max-bytes: 36
          writeOnly: true
        scp_host:
          type: string
          minLength: 1
          maxLength: 253
          x-yafvs-max-bytes: 253
          writeOnly: true
        scp_port:
          type: integer
          format: uint16
          minimum: 1
          maximum: 65535
          writeOnly: true
        scp_known_hosts:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
          writeOnly: true
          description: Required OpenSSH known-hosts content used as the exclusive host-key trust source. CR, LF, and tab are preserved; other control characters are rejected.
        scp_path:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
          writeOnly: true
        report_format_id:
          type: string
          format: uuid
          maxLength: 36
          x-yafvs-max-bytes: 36
          writeOnly: true
    AlertStartTaskCreateRequest:
      type: object
      additionalProperties: false
      required: [method, name, active, status, task_id]
      description: Strict write-only task reference contract for fixed TASK_RUN_STATUS_CHANGED + ALWAYS + Start Task alert creation. The referenced task is resolved and authorized under the request operator before the alert is inserted; task reference data is not returned in native alert metadata.
      properties:
        method:
          type: string
          const: START_TASK
        name:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        comment:
          type: string
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        active:
          type: boolean
        status:
          type: string
          maxLength: 32
          x-yafvs-max-bytes: 32
          enum: [Delete Requested, Ultimate Delete Requested, Ultimate Delete Waiting, Delete Waiting, Done, New, Requested, Running, Queued, Stop Requested, Stop Waiting, Stopped, Processing, Interrupted]
        task_id:
          type: string
          format: uuid
          maxLength: 36
          x-yafvs-max-bytes: 36
          writeOnly: true
    AlertSmbCreateRequest:
      type: object
      additionalProperties: false
      required: [method, name, active, status, smb_credential_id, smb_share_path, smb_file_path, report_format_id]
      description: Strict write-only delivery contract for fixed TASK_RUN_STATUS_CHANGED + ALWAYS + SMB alert creation. The SMB credential, share path, file path, report format, and optional maximum protocol are validated and persisted by gvmd; none is returned in native alert metadata.
      properties:
        method:
          type: string
          const: SMB
        name:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        comment:
          type: string
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        active:
          type: boolean
        status:
          type: string
          maxLength: 32
          x-yafvs-max-bytes: 32
          enum: [Delete Requested, Ultimate Delete Requested, Ultimate Delete Waiting, Delete Waiting, Done, New, Requested, Running, Queued, Stop Requested, Stop Waiting, Stopped, Processing, Interrupted]
        smb_credential_id:
          type: string
          format: uuid
          maxLength: 36
          x-yafvs-max-bytes: 36
          writeOnly: true
        smb_share_path:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
          writeOnly: true
        smb_file_path:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
          writeOnly: true
        report_format_id:
          type: string
          format: uuid
          maxLength: 36
          x-yafvs-max-bytes: 36
          writeOnly: true
        smb_max_protocol:
          type: string
          enum: [default, NT1, SMB2, SMB3]
          default: default
          writeOnly: true
