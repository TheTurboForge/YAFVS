openapi: 3.1.0
info:
  title: YAFVS Native API
  version: 0.1.0-contract
  description: Contract baseline for DB-backed YAFVS product workflows. Current live operations include guarded reads, writes, and control paths. Every native mutation is additionally subject to the service-wide database compatibility gate and returns 503 with database_write_incompatible when the detected gvmd/pg-gvm schema is not the exact characterized write schema; reads remain available on a best-effort basis. Every native request has a bounded whole-request deadline. Read timeouts return 504 request_timed_out; mutation timeouts conservatively return 502 mutation_outcome_indeterminate because cancellation can race a commit or control acknowledgement. Direct listener responses include X-Request-Id for correlation.
servers:
  - url: /api/v1
  - url: http://127.0.0.1:19080/api/v1
    description: Opt-in development direct API listener; requires bearer authentication.
security:
  - operatorSession: []
  - bearerAuth: []
x-yafvs-operation-profiles:
  shared-read:
    exposure: direct-read
    surfaces: [internal, browser-proxy, direct]
    principals: [authenticated-human-operator, bearer-authenticated-automation-client]
    authentication:
      internal: private-service-secret-with-optional-operator-context
      browser-proxy: authenticated-gsad-session-and-private-proxy-context
      direct: bearer-token
    team-authority: shared-stack-operator-visibility
    write-gate: not-applicable-read-only
    schema-compatibility: best-effort-read-schema
    request-limits: listener-bounds-and-openapi-parameter-schema
    destructive-classification: read-only
    confirmation: none
    idempotency: safe-and-idempotent
    audit-event: surface-request-outcome
  shared-write:
    exposure: direct-write
    surfaces: [internal, browser-proxy, direct]
    principals: [authenticated-human-operator, configured-automation-operator]
    authentication:
      internal: private-service-secret-and-operator-context
      browser-proxy: authenticated-gsad-session-and-private-proxy-context
      direct: bearer-token-and-configured-operator
    team-authority: authenticated-stack-operator
    write-gate: exact-database-schema-and-surface-write-control
    schema-compatibility: exact-characterized-write-schema
    request-limits: listener-bounds-and-openapi-body-query-schema
    destructive-classification: derived-from-method-and-operation-side-effect
    confirmation: client-required-for-destructive-operations
    idempotency: derived-from-http-method
    audit-event: surface-request-outcome
  direct-write:
    exposure: direct-write
    surfaces: [internal, direct]
    principals: [configured-automation-operator]
    authentication:
      internal: private-service-secret-and-operator-context
      direct: bearer-token-and-configured-operator
    team-authority: authenticated-stack-operator
    write-gate: exact-database-schema-and-explicit-direct-write-control
    schema-compatibility: exact-characterized-write-schema
    request-limits: listener-bounds-and-openapi-body-query-schema
    destructive-classification: derived-from-method-and-operation-side-effect
    confirmation: operation-specific
    idempotency: derived-from-http-method
    audit-event: direct-request-outcome
  browser-write:
    exposure: browser-write
    surfaces: [internal, browser-proxy]
    principals: [authenticated-human-operator]
    authentication:
      internal: private-service-secret-and-operator-context
      browser-proxy: authenticated-gsad-session-and-private-proxy-context
    team-authority: authenticated-stack-operator
    write-gate: exact-database-schema-and-authenticated-browser-proxy
    schema-compatibility: exact-characterized-write-schema
    request-limits: listener-bounds-and-openapi-body-query-schema
    destructive-classification: derived-from-method-and-operation-side-effect
    confirmation: client-required-for-destructive-operations
    idempotency: derived-from-http-method
    audit-event: browser-proxy-request-outcome
paths:
  /results:
    get:
      operationId: getResults
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: result-list-and-effective-overrides-read
      summary: List top-level scan results
      description: Read-only scan result list backed by gvmd/PostgreSQL. Rows include page-bounded effective override metadata for display. Result-tag assignment uses the separate native tag contract; exports and other result actions remain on inherited compatibility paths.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/CollectionTaskId'
        - $ref: '#/components/parameters/NvtOidFilter'
      responses:
        '200':
          description: Result collection across raw scan reports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '502':
          $ref: '#/components/responses/BadGateway'
  /results/{result_id}:
    get:
      operationId: getResultsByResultId
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: result-detail-metadata-tags-and-overrides-read
      summary: Read one scan result metadata row
      description: Read-only raw result detail backed by gvmd/PostgreSQL. Native detail includes result/NVT explanatory text, NVT-level EPSS context, active result user tags, and effective active override metadata for display. Result-tag assignment uses the separate native tag contract; inherited paths still own result exports, other actions, and richer compatibility-only detail surfaces. Override creation and mutation use the native override lifecycle.
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: Result metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /results/{result_id}/export:
    get:
      operationId: getResultsByResultIdExport
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: result-metadata-export-read
      summary: Export one scan result metadata row
      description: Direct scriptable result metadata export backed by the same PostgreSQL loader as result detail. This returns native JSON metadata, NVT context, active result tags, and effective active override display metadata only. Result-tag assignment uses the separate native tag contract; bulk result export, result actions, override create/modify/delete/export workflows, and other legacy result actions remain outside this endpoint.
      parameters:
        - $ref: '#/components/parameters/ResultId'
      responses:
        '200':
          description: Result metadata export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /vulnerabilities:
    get:
      operationId: getVulnerabilities
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: vulnerability-list-read
      summary: List top-level vulnerabilities from scan results
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/VulnerabilityIdFilter'
      responses:
        '200':
          description: Vulnerability collection aggregated from positive-severity raw scan results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnerabilityCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /vulnerabilities/{vulnerability_id}:
    get:
      operationId: getVulnerabilitiesByVulnerabilityId
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: vulnerability-detail-read
      summary: Get vulnerability metadata
      description: Direct native JSON metadata detail for one observed top-level vulnerability aggregated from positive-severity raw scan results. This does not replace inherited bulk XML/table export or future vulnerability actions.
      parameters:
        - name: vulnerability_id
          in: path
          required: true
          schema:
            type: string
          description: NVT OID for the vulnerability row.
      responses:
        '200':
          description: Vulnerability metadata detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vulnerability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /vulnerabilities/{vulnerability_id}/export:
    get:
      operationId: getVulnerabilitiesByVulnerabilityIdExport
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: vulnerability-metadata-export-read
      summary: Export vulnerability metadata
      description: Direct native JSON metadata export for one observed top-level vulnerability aggregated from positive-severity raw scan results. This does not replace inherited bulk XML/table export or future vulnerability actions.
      parameters:
        - name: vulnerability_id
          in: path
          required: true
          schema:
            type: string
          description: NVT OID for the vulnerability row.
      responses:
        '200':
          description: Vulnerability metadata export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vulnerability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cves:
    get:
      operationId: getCves
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: cve-catalog-list-read
      summary: List Security Information CVEs
      description: Searchable CVE intelligence catalog backed by SCAP feed metadata in gvmd/PostgreSQL. This is distinct from observed report CVEs and vulnerability findings.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: CVE catalog collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCveCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cves/{cve_id}:
    get:
      operationId: getCvesByCveId
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: cve-catalog-detail-epss-reference-configuration-read
      summary: Read one Security Information CVE
      description: Read-only CVE catalog detail backed by gvmd/PostgreSQL. Native detail includes EPSS score/percentile, URL/tag references, CERT advisory and NVT references, and SCAP configuration nodes for display.
      parameters:
        - $ref: '#/components/parameters/CveId'
      responses:
        '200':
          description: CVE catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCveDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cves/{cve_id}/export:
    get:
      operationId: getCvesByCveIdExport
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: cve-catalog-metadata-export-read
      summary: Export one Security Information CVE as native JSON metadata
      description: Direct scriptable CVE catalog metadata export backed by gvmd/PostgreSQL. This returns the same read-only native detail JSON as the CVE detail endpoint, including EPSS, references, CERT/NVT links, SCAP configuration nodes, and user tags.
      parameters:
        - $ref: '#/components/parameters/CveId'
      responses:
        '200':
          description: CVE catalog metadata export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCveDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cpes:
    get:
      operationId: getCpes
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: cpe-catalog-list-read
      summary: List Security Information CPEs
      description: Searchable CPE intelligence catalog backed by SCAP feed metadata in gvmd/PostgreSQL. This is distinct from observed operating-system and application evidence in raw and scope reports.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: CPE catalog collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCpeCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cpes/{cpe_id}:
    get:
      operationId: getCpesByCpeId
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: cpe-catalog-detail-read
      summary: Read one Security Information CPE
      description: Read-only CPE catalog detail backed by SCAP feed metadata in gvmd/PostgreSQL. Native detail includes normalized CVE references, deprecation metadata, user tags, and bounded SCAP reference URLs extracted from feed detail XML.
      parameters:
        - $ref: '#/components/parameters/CpeId'
      responses:
        '200':
          description: CPE catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCpeDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cert-bund-advisories:
    get:
      operationId: getCertBundAdvisories
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: cert-bund-advisory-list-read
      summary: List Security Information CERT-Bund advisories
      description: Searchable CERT-Bund advisory list backed by CERT feed metadata already imported into gvmd/PostgreSQL.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: CERT-Bund advisory collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertBundAdvisoryCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cert-bund-advisories/{cert_bund_advisory_id}:
