          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        value:
          type: string
          maxLength: 4096
        active:
          type: boolean
        resource_type:
          type: string
          enum: [alert, cert_bund_adv, credential, cpe, cve, dfn_cert_adv, filter, host, nvt, os, override, port_list, report, report_format, result, scanner, schedule, config, target, task, tls_certificate, user]
