name: Release Compliance Evidence

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Distribution mode to evaluate
        required: true
        default: binary
        type: choice
        options:
          - binary
          - container
          - hosted
          - feed-redistribution

permissions:
  contents: read

jobs:
  evidence:
    name: Fail-closed release evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out complete history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install evidence tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils jq reuse

      - name: Install pinned Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      - name: Generate complete evidence bundle
        id: evidence
        continue-on-error: true
        env:
          YAFVS_EVIDENCE_DIR: ${{ runner.temp }}/release-compliance
          YAFVS_RELEASE_BUILD_DIR: ${{ runner.temp }}/release-build
        run: tools/release-compliance-evidence "${{ inputs.mode }}"

      - name: Upload evidence even when blocked
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: yafvs-release-compliance-${{ inputs.mode }}
          path: ${{ runner.temp }}/release-compliance
          if-no-files-found: error

      - name: Enforce release decision
        if: always()
        env:
          EVIDENCE_OUTCOME: ${{ steps.evidence.outcome }}
        run: test "$EVIDENCE_OUTCOME" = success
