name: turbovas

services:
  postgres:
    build:
      context: ..
      dockerfile: docker/runtime/postgres/Dockerfile
    image: turbovas-postgres-dev
    restart: unless-stopped
    environment:
      LD_LIBRARY_PATH: /turbovas-prefix/lib:/turbovas-prefix/lib64
      POSTGRES_USER: ${POSTGRES_USER:-turbovas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turbovas-dev}
      POSTGRES_DB: ${POSTGRES_DB:-turbovas}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/postgres
        target: /var/lib/postgresql/data
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/logs/postgres
        target: /var/log/postgresql
      - type: bind
        source: ../build/prefix
        target: /turbovas-prefix
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-openvas:
    image: redis:7-bookworm
    restart: unless-stopped
    user: "${TURBOVAS_UID:-1000}:${TURBOVAS_GID:-1000}"
    command:
      - sh
      - -lc
      - >
        mkdir -p /run/redis-openvas /data /logs &&
        rm -f /run/redis-openvas/redis.sock &&
        exec redis-server
        --port 0
        --unixsocket /run/redis-openvas/redis.sock
        --unixsocketperm 770
        --dir /data
        --appendonly yes
        --pidfile /run/redis-openvas/redis-server.pid
        --logfile /logs/redis-openvas.log
    volumes:
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/redis-openvas
        target: /data
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/redis-openvas
        target: /run/redis-openvas
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/logs/redis-openvas
        target: /logs
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -s /run/redis-openvas/redis.sock ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    user: "${TURBOVAS_UID:-1000}:${TURBOVAS_GID:-1000}"
    environment:
      TURBOVAS_MQTT_OPENVAS_PASSWORD: ${TURBOVAS_MQTT_OPENVAS_PASSWORD:-}
      TURBOVAS_MQTT_NOTUS_PASSWORD: ${TURBOVAS_MQTT_NOTUS_PASSWORD:-}
      TURBOVAS_MQTT_OSPD_PASSWORD: ${TURBOVAS_MQTT_OSPD_PASSWORD:-}
      TURBOVAS_MQTT_HEALTH_PASSWORD: ${TURBOVAS_MQTT_HEALTH_PASSWORD:-}
    command:
      - sh
      - -ec
      - >
        umask 077 &&
        test -n "$${TURBOVAS_MQTT_OPENVAS_PASSWORD}" &&
        test -n "$${TURBOVAS_MQTT_NOTUS_PASSWORD}" &&
        test -n "$${TURBOVAS_MQTT_OSPD_PASSWORD}" &&
        test -n "$${TURBOVAS_MQTT_HEALTH_PASSWORD}" &&
        cp /mosquitto/config-source/mosquitto.acl /mosquitto/config-secrets/mosquitto.acl &&
        chmod 600 /mosquitto/config-secrets/mosquitto.acl &&
        mosquitto_passwd -b -c /mosquitto/config-secrets/passwords openvas "$${TURBOVAS_MQTT_OPENVAS_PASSWORD}" &&
        mosquitto_passwd -b /mosquitto/config-secrets/passwords notus "$${TURBOVAS_MQTT_NOTUS_PASSWORD}" &&
        mosquitto_passwd -b /mosquitto/config-secrets/passwords ospd "$${TURBOVAS_MQTT_OSPD_PASSWORD}" &&
        mosquitto_passwd -b /mosquitto/config-secrets/passwords health "$${TURBOVAS_MQTT_HEALTH_PASSWORD}" &&
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - type: bind
        source: ../docker/runtime/mosquitto.conf
        target: /mosquitto/config/mosquitto.conf
        read_only: true
      - type: bind
        source: ../docker/runtime/mosquitto.acl
        target: /mosquitto/config-source/mosquitto.acl
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/mosquitto/secrets
        target: /mosquitto/config-secrets
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/mosquitto/data
        target: /mosquitto/data
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/logs/mosquitto
        target: /mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -p 1883 -u health -P \"$${TURBOVAS_MQTT_HEALTH_PASSWORD}\" -t turbovas/health -m ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  dev-shell:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    user: "${TURBOVAS_UID:-1000}:${TURBOVAS_GID:-1000}"
    environment:
      HOME: /tmp
      CCACHE_DIR: /workspace/build/ccache
      CMAKE_GENERATOR: Ninja
      TURBOVAS_RUNTIME_DIR: /runtime
    volumes:
      - type: bind
        source: ..
        target: /workspace
      - type: bind
        source: ..
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}
        target: /runtime
      - type: bind
        source: ../build
        target: /workspace/build
    command: ["sleep", "infinity"]

  gvmd:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    user: "${TURBOVAS_UID:-1000}:${TURBOVAS_GID:-1000}"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      HOME: /tmp
      LD_LIBRARY_PATH: /workspace/build/prefix/lib:/workspace/build/prefix/lib64
      PATH: /workspace/build/prefix/sbin:/workspace/build/prefix/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PGPASSWORD: ${POSTGRES_PASSWORD:-turbovas-dev}
      POSTGRES_USER: ${POSTGRES_USER:-turbovas}
      POSTGRES_DB: ${POSTGRES_DB:-turbovas}
      TURBOVAS_RUNTIME_DIR: /runtime
      TURBOVAS_GVMD_CONTROL_SECRET: ${TURBOVAS_GVMD_CONTROL_SECRET:-}
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - type: bind
        source: ..
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/feeds
        target: /runtime/feeds
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/feed-update.lock
        target: /runtime/run/feed-update.lock
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/gvmd-gmp
        target: /runtime/run/gvmd-gmp
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/gvmd-control
        target: /runtime/run/gvmd-control
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/gvmd
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}/build/run/gvmd
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/ospd
        target: /runtime/run/ospd
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/logs/gvmd
        target: /runtime/logs/gvmd
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/logs/gvmd
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}/build/logs
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/state/gvmd
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}/build/var/lib/gvm/gvmd
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/state/gvmd-bind-files/gvmd.sem
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}/build/var/lib/gvm/gvmd.sem
      - type: bind
        source: ../build
        target: /workspace/build
        read_only: true
    command:
      - sh
      - -lc
      - >
        mkdir -p /runtime/run/gvmd-gmp /runtime/run/gvmd-control /runtime/logs/gvmd &&
        rm -f /runtime/run/gvmd-gmp/gvmd.sock /runtime/run/gvmd-control/turbovas-control.sock &&
        exec gvmd --foreground
        --database="$${POSTGRES_DB:-turbovas}"
        --db-host=postgres
        --db-port=5432
        --db-user="$${POSTGRES_USER:-turbovas}"
        --feed-lock-path=/runtime/run/feed-update.lock
        --disable-scheduling
        --scan-queue
        --max-active-scan-handlers=1
        --unix-socket=/runtime/run/gvmd-gmp/gvmd.sock
        --turbovas-control-socket=/runtime/run/gvmd-control/turbovas-control.sock
        --listen-mode=0660

  ospd-openvas:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    init: true
    hostname: turbovas-ospd-openvas
    working_dir: /workspace
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      redis-openvas:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      HOME: /tmp
      GNUPGHOME: /runtime/state/feed-gnupg
      LD_LIBRARY_PATH: /workspace/build/prefix/lib:/workspace/build/prefix/lib64
      PATH: /workspace/build/venvs/ospd-openvas/bin:/workspace/build/openvas-scanner/src:/workspace/build/prefix/sbin:/workspace/build/prefix/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      TURBOVAS_RUNTIME_DIR: /runtime
      TURBOVAS_UID: ${TURBOVAS_UID:-1000}
      TURBOVAS_GID: ${TURBOVAS_GID:-1000}
      TURBOVAS_MQTT_OSPD_PASSWORD: ${TURBOVAS_MQTT_OSPD_PASSWORD:-}
      NMAP_PRIVILEGED: "1"
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - type: bind
        source: ..
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/ospd
        target: /runtime/run/ospd
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/redis-openvas
        target: /runtime/run/redis-openvas
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/certs
        target: /runtime/certs
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/logs/ospd
        target: /runtime/logs/ospd
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/state/feed-gnupg
        target: /runtime/state/feed-gnupg
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/feeds/openvas
        target: /runtime/feeds/openvas
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/feeds/notus
        target: /runtime/feeds/notus
        read_only: true
      - type: bind
        source: ../build
        target: /workspace/build
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/state/ospd/openvas.conf
        target: /workspace/build/prefix/etc/openvas/openvas.conf
        read_only: true
    command:
      - sh
      - -lc
      - >
        install -d -m 0770 -o "$${TURBOVAS_UID:-1000}" -g "$${TURBOVAS_GID:-1000}" /runtime/run/ospd /runtime/logs/ospd &&
        install -d -m 0700 -o "$${TURBOVAS_UID:-1000}" -g "$${TURBOVAS_GID:-1000}" /runtime/state/feed-gnupg &&
        mkdir -p /runtime/feeds/notus/advisories &&
        if command -v setcap >/dev/null 2>&1; then
          setcap cap_net_raw,cap_net_admin+eip /usr/bin/nmap ||
          echo "WARN: could not set nmap file capabilities" >&2;
        else
          echo "WARN: setcap is unavailable; nmap capability check will fail" >&2;
        fi &&
        rm -f /runtime/run/ospd/ospd-openvas.sock /runtime/run/ospd/ospd-openvas.pid &&
        exec setpriv
        --reuid "$${TURBOVAS_UID:-1000}"
        --regid "$${TURBOVAS_GID:-1000}"
        --clear-groups
        --inh-caps +net_raw,+net_admin
        --ambient-caps +net_raw,+net_admin
        /workspace/build/venvs/ospd-openvas/bin/ospd-openvas --foreground
        --unix-socket=/runtime/run/ospd/ospd-openvas.sock
        --pid-file=/runtime/run/ospd/ospd-openvas.pid
        --lock-file-dir=/runtime/run/ospd
        --socket-mode=0o770
        --key-file=/runtime/certs/private/CA/serverkey.pem
        --cert-file=/runtime/certs/CA/servercert.pem
        --ca-file=/runtime/certs/CA/cacert.pem
        --log-file=/runtime/logs/ospd/ospd-openvas.log
        --mqtt-broker-address=mosquitto
        --mqtt-broker-port=1883
        --mqtt-broker-username=ospd
        --mqtt-broker-password="$${TURBOVAS_MQTT_OSPD_PASSWORD}"
        --max-scans=0
        --notus-feed-dir=/runtime/feeds/notus/advisories

  notus-scanner:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    user: "${TURBOVAS_UID:-1000}:${TURBOVAS_GID:-1000}"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      HOME: /tmp
      GNUPGHOME: /runtime/state/feed-gnupg
      LD_LIBRARY_PATH: /workspace/build/prefix/lib:/workspace/build/prefix/lib64
      PATH: /workspace/build/venvs/notus-scanner/bin:/workspace/build/prefix/sbin:/workspace/build/prefix/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      TURBOVAS_RUNTIME_DIR: /runtime
      NOTUS_SCANNER_MQTT_BROKER_USERNAME: notus
      NOTUS_SCANNER_MQTT_BROKER_PASSWORD: ${TURBOVAS_MQTT_NOTUS_PASSWORD:-}
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - type: bind
        source: ..
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/notus
        target: /runtime/run/notus
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/logs/notus
        target: /runtime/logs/notus
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/state/feed-gnupg
        target: /runtime/state/feed-gnupg
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/feeds/notus
        target: /runtime/feeds/notus
        read_only: true
      - type: bind
        source: ../build
        target: /workspace/build
        read_only: true
    command:
      - sh
      - -lc
      - >
        mkdir -p /runtime/run/notus /runtime/logs/notus /runtime/feeds/notus/products /runtime/state/feed-gnupg &&
        chmod 700 /runtime/state/feed-gnupg &&
        rm -f /runtime/run/notus/notus-scanner.pid &&
        exec /workspace/build/venvs/notus-scanner/bin/notus-scanner --foreground
        --products-directory=/runtime/feeds/notus/products
        --mqtt-broker-address=mosquitto
        --mqtt-broker-port=1883
        --pid-file=/runtime/run/notus/notus-scanner.pid
        --log-file=/runtime/logs/notus/notus-scanner.log
        --log-level=INFO

  gsad:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    user: "${TURBOVAS_UID:-1000}:${TURBOVAS_GID:-1000}"
    depends_on:
      gvmd:
        condition: service_started
    environment:
      HOME: /tmp
      LD_LIBRARY_PATH: /workspace/build/prefix/lib:/workspace/build/prefix/lib64
      PATH: /workspace/build/prefix/sbin:/workspace/build/prefix/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      TURBOVAS_RUNTIME_DIR: /runtime
      TURBOVAS_API_BROWSER_PROXY_SECRET: ${TURBOVAS_API_BROWSER_PROXY_SECRET:-}
    ports:
      - "${TURBOVAS_GSAD_HOST:-127.0.0.1}:19392:9392"
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - type: bind
        source: ..
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/gvmd-gmp
        target: /runtime/run/gvmd
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/certs
        target: /runtime/certs
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/logs/gsad
        target: /runtime/logs/gsad
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/logs/gsad
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}/build/logs
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/gsad
        target: ${TURBOVAS_REPO_MOUNT_PATH:-/home/turboforge/Projects/TurboVAS}/build/run/gsad
      - type: bind
        source: ../build
        target: /workspace/build
        read_only: true
    command:
      - sh
      - -lc
      - >
        mkdir -p /runtime/logs/gsad &&
        exec gsad --foreground
        --listen=0.0.0.0
        --port=9392
        --munix-socket=/runtime/run/gvmd/gvmd.sock
        --ssl-private-key=/runtime/certs/private/CA/serverkey.pem
        --ssl-certificate=/runtime/certs/CA/servercert.pem
        --no-redirect
        --static-content=/workspace/build/prefix/share/gvm/gsad/web

  turbovas-api:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: docker/turbovas-api/Dockerfile
    restart: unless-stopped
    depends_on:
      gvmd:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-turbovas}:${POSTGRES_PASSWORD:-turbovas-dev}@postgres:5432/${POSTGRES_DB:-turbovas}
      RUST_LOG: ${TURBOVAS_API_LOG:-info}
      TURBOVAS_API_BIND: 0.0.0.0:9080
      TURBOVAS_API_DIRECT_BIND: ${TURBOVAS_API_DIRECT_BIND:-}
      TURBOVAS_API_BEARER_TOKEN: ${TURBOVAS_API_BEARER_TOKEN:-}
      TURBOVAS_API_BEARER_TOKEN_FILE: ${TURBOVAS_API_BEARER_TOKEN_FILE:-}
      TURBOVAS_API_OPERATOR_UUID: ${TURBOVAS_API_OPERATOR_UUID:-}
      TURBOVAS_API_OPERATOR_NAME: ${TURBOVAS_API_OPERATOR_NAME:-}
      TURBOVAS_API_DIRECT_WRITE_CONTROL: ${TURBOVAS_API_DIRECT_WRITE_CONTROL:-}
      TURBOVAS_API_BROWSER_PROXY_SECRET: ${TURBOVAS_API_BROWSER_PROXY_SECRET:-}
      TURBOVAS_API_GVMD_CONTROL_SOCKET: /runtime/run/gvmd/turbovas-control.sock
      TURBOVAS_GVMD_CONTROL_SECRET: ${TURBOVAS_GVMD_CONTROL_SECRET:-}
      TURBOVAS_FEED_METADATA_DIR: /runtime/feeds
      TURBOVAS_FEED_LOCK_DIR: /runtime/run
    volumes:
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/feeds
        target: /runtime/feeds
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/feed-update.lock
        target: /runtime/run/feed-update.lock
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/ospd
        target: /runtime/run/ospd
        read_only: true
      - type: bind
        source: ${TURBOVAS_RUNTIME_DIR:-../../TurboVAS-runtime}/run/gvmd-control
        target: /runtime/run/gvmd
        read_only: true
    # No host port by default. Direct API exposure is added only by the
    # generated opt-in direct-API override used by turbovasctl.

networks:
  default:
    name: turbovas-dev
