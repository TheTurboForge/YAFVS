source_suffixes = ["c", "h", "cc", "cpp", "rs", "py", "js", "jsx", "ts", "tsx", "sql"]
allowed_derivations = ["original", "behavioral-reimplementation", "adaptation", "translation"]

# `original` means written for YAFVS without adapting source expression. Behavioral
# reimplementation may use documented behavior and independently anchored tests.
# Adaptation and translation both require an exact YAFVS-Source-Provenance marker.
[[review_surfaces]]
id = "native-manager-gvmd-derivation"
path = "services/yafvs-api/"
status = "legal-review-required"
question = "The native manager/API is AGPL-3.0-or-later. Classify its files as independent behavioral reimplementation or adaptation of gvmd, record any required source provenance, and confirm the exact Corresponding Source boundary."
