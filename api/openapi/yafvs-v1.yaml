      description: Guarded direct write-control endpoint for starting a human-owned inactive scan task without changing its owner. Every authenticated stack operator may request the action when the task's target and scanner references are valid. The endpoint creates the requested report and scan-queue rows transactionally and returns the report id; gvmd remains responsible for scanner protocol execution, result ingestion, and later task/report state transitions. The deployed gvmd must run with scan-queue processing enabled. Stop is provided by the separate private gvmd control-socket route. Resume, CVE-only tasks, remote scanner transport changes, alerts, schedules, and task mutation are outside this route.
