      summary: Create a task-status EMAIL, SMB, Syslog, SNMP, SCP, or Start Task alert
      description: Creates one operator-owned EMAIL, SMB, Syslog, SNMP, SCP, or Start Task alert through gvmd's authoritative ACL and transaction path with fixed TASK_RUN_STATUS_CHANGED event and ALWAYS condition semantics. Reference-bearing methods lock and validate their dependencies transactionally. The explicit method discriminator selects a strict write-only delivery shape. The operation is available through direct bearer-token access and the authenticated same-origin browser proxy; both resolve the authoritative operator UUID before mutation. Addresses, paths, subjects, SNMP fields, known-host pins, credential/report/task references, and message content are write-only; the response is reloaded from authoritative database metadata and contains no delivery payload. A 502 committed_response_unavailable response means the mutation committed but its identifier or authoritative response failed. A 502 mutation_outcome_indeterminate response means the complete control request may have committed but no authoritative response arrived. Callers must inspect current state before retrying either outcome. Later delivery-payload mutation remains a residual path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertCreateRequest'
      responses:
        '201':
          description: Alert created; response contains redacted metadata only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertAsset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '502':
          description: The mutation committed without a complete authoritative response (committed_response_unavailable), may have committed without any authoritative response (mutation_outcome_indeterminate), or the private control service returned an invalid response. Inspect the Error code and verify current state before retrying an indeterminate mutation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
