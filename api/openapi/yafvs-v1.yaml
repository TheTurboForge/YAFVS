    AlertCreateRequest:
      oneOf:
        - $ref: '#/components/schemas/AlertEmailCreateRequest'
        - $ref: '#/components/schemas/AlertSmbCreateRequest'
        - $ref: '#/components/schemas/AlertSyslogCreateRequest'
        - $ref: '#/components/schemas/AlertSnmpCreateRequest'
        - $ref: '#/components/schemas/AlertScpCreateRequest'
        - $ref: '#/components/schemas/AlertStartTaskCreateRequest'
      discriminator:
        propertyName: method
        mapping:
          EMAIL: '#/components/schemas/AlertEmailCreateRequest'
          SMB: '#/components/schemas/AlertSmbCreateRequest'
          SYSLOG: '#/components/schemas/AlertSyslogCreateRequest'
          SNMP: '#/components/schemas/AlertSnmpCreateRequest'
          SCP: '#/components/schemas/AlertScpCreateRequest'
          START_TASK: '#/components/schemas/AlertStartTaskCreateRequest'
    AlertDefinition:
      oneOf:
        - $ref: '#/components/schemas/AlertEmailDefinition'
        - $ref: '#/components/schemas/AlertSmbDefinition'
        - $ref: '#/components/schemas/AlertSyslogDefinition'
        - $ref: '#/components/schemas/AlertSnmpDefinition'
        - $ref: '#/components/schemas/AlertScpDefinition'
        - $ref: '#/components/schemas/AlertStartTaskDefinition'
      discriminator:
        propertyName: method
        mapping:
          EMAIL: '#/components/schemas/AlertEmailDefinition'
          SMB: '#/components/schemas/AlertSmbDefinition'
          SYSLOG: '#/components/schemas/AlertSyslogDefinition'
          SNMP: '#/components/schemas/AlertSnmpDefinition'
          SCP: '#/components/schemas/AlertScpDefinition'
          START_TASK: '#/components/schemas/AlertStartTaskDefinition'
    AlertDefinitionBase:
      type: object
      required: [revision, name, comment, active, status]
      properties:
        revision:
          type: string
          pattern: '^[0-9]{1,20}$'
          readOnly: true
          description: Opaque PostgreSQL row revision required as expected_revision by full replacement.
        name:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        comment:
          type: string
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        active:
          type: boolean
        status:
          type: string
          maxLength: 32
          x-yafvs-max-bytes: 32
          enum: [Delete Requested, Ultimate Delete Requested, Ultimate Delete Waiting, Delete Waiting, Done, New, Requested, Running, Queued, Stop Requested, Stop Waiting, Stopped, Processing, Interrupted]
    AlertEmailDefinition:
      allOf:
        - $ref: '#/components/schemas/AlertDefinitionBase'
        - type: object
          required: [method, to_address, subject, notice]
          properties:
            method:
              type: string
              const: EMAIL
            to_address:
              type: string
            from_address:
              type: string
            subject:
              type: string
            notice:
              type: string
              enum: [simple, include, attach]
            recipient_credential_id:
              type: string
              format: uuid
            report_format_id:
              type: string
              format: uuid
            message:
              type: string
      unevaluatedProperties: false
    AlertSmbDefinition:
      allOf:
        - $ref: '#/components/schemas/AlertDefinitionBase'
        - type: object
          required: [method, smb_credential_id, smb_share_path, smb_file_path, report_format_id, smb_max_protocol]
          properties:
            method:
              type: string
              const: SMB
            smb_credential_id:
              type: string
              format: uuid
            smb_share_path:
              type: string
            smb_file_path:
              type: string
            report_format_id:
              type: string
              format: uuid
            smb_max_protocol:
              type: string
              enum: [default, NT1, SMB2, SMB3]
      unevaluatedProperties: false
    AlertSyslogDefinition:
      allOf:
        - $ref: '#/components/schemas/AlertDefinitionBase'
        - type: object
          required: [method]
          properties:
            method:
              type: string
              const: SYSLOG
      unevaluatedProperties: false
    AlertSnmpDefinition:
      allOf:
        - $ref: '#/components/schemas/AlertDefinitionBase'
        - type: object
          required: [method, snmp_agent, snmp_community_configured, snmp_message]
          properties:
            method:
              type: string
              const: SNMP
            snmp_agent:
              type: string
            snmp_community_configured:
              type: boolean
              description: True only when exactly one nonempty SNMP community row is configured. The community value is never selected or returned.
            snmp_message:
              type: string
      unevaluatedProperties: false
    AlertScpDefinition:
      allOf:
        - $ref: '#/components/schemas/AlertDefinitionBase'
        - type: object
          required: [method, scp_credential_id, scp_host, scp_port, scp_known_hosts, scp_path, report_format_id]
          properties:
            method:
              type: string
              const: SCP
            scp_credential_id:
              type: string
              format: uuid
            scp_host:
              type: string
            scp_port:
              type: integer
              format: uint16
              minimum: 1
              maximum: 65535
            scp_known_hosts:
              type: string
            scp_path:
              type: string
            report_format_id:
              type: string
              format: uuid
      unevaluatedProperties: false
    AlertStartTaskDefinition:
      allOf:
        - $ref: '#/components/schemas/AlertDefinitionBase'
        - type: object
          required: [method, task_id]
          properties:
            method:
              type: string
              const: START_TASK
            task_id:
              type: string
              format: uuid
      unevaluatedProperties: false
    AlertDefinitionReplaceRequest:
      type: object
      additionalProperties: false
      required: [expected_revision, definition]
      properties:
        expected_revision:
          type: string
          pattern: '^[0-9]{1,20}$'
          description: Opaque revision returned by the definition GET; a stale value returns 409.
        definition:
          oneOf:
            - $ref: '#/components/schemas/AlertEmailCreateRequest'
            - $ref: '#/components/schemas/AlertSmbCreateRequest'
            - $ref: '#/components/schemas/AlertSyslogCreateRequest'
            - $ref: '#/components/schemas/AlertSnmpDefinitionReplaceRequest'
            - $ref: '#/components/schemas/AlertScpCreateRequest'
            - $ref: '#/components/schemas/AlertStartTaskCreateRequest'
          discriminator:
            propertyName: method
            mapping:
              EMAIL: '#/components/schemas/AlertEmailCreateRequest'
              SMB: '#/components/schemas/AlertSmbCreateRequest'
              SYSLOG: '#/components/schemas/AlertSyslogCreateRequest'
              SNMP: '#/components/schemas/AlertSnmpDefinitionReplaceRequest'
              SCP: '#/components/schemas/AlertScpCreateRequest'
              START_TASK: '#/components/schemas/AlertStartTaskCreateRequest'
    AlertSnmpDefinitionReplaceRequest:
      type: object
      additionalProperties: false
      required: [method, name, active, status, snmp_agent, snmp_community_mode, snmp_message]
      description: Strict SNMP full-replacement shape. Preserve retains an existing nonempty SNMP community without selecting it. Replace requires a bounded nonempty write-only community.
      properties:
        method:
          type: string
          const: SNMP
        name:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        comment:
          type: string
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        active:
          type: boolean
        status:
          type: string
          maxLength: 32
          x-yafvs-max-bytes: 32
          enum: [Delete Requested, Ultimate Delete Requested, Ultimate Delete Waiting, Delete Waiting, Done, New, Requested, Running, Queued, Stop Requested, Stop Waiting, Stopped, Processing, Interrupted]
        snmp_agent:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        snmp_community_mode:
          type: string
          enum: [preserve, replace]
        snmp_community:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
          writeOnly: true
        snmp_message:
          type: string
          minLength: 1
          maxLength: 2000
          x-yafvs-max-bytes: 2000
      oneOf:
        - properties:
            snmp_community_mode:
              const: preserve
          not:
            required: [snmp_community]
        - properties:
            snmp_community_mode:
              const: replace
          required: [snmp_community]
    AlertDeliverReportRequest:
      type: object
      additionalProperties: false
      required: [report_id]
      description: Dispatches the supplied report through the alert's configured delivery method. Exactly zero or one of filter and filter_id may be supplied. report_format_id is intentionally absent because inherited alert dispatch ignores it.
      properties:
        report_id:
          type: string
          format: uuid
        filter:
          type: string
          maxLength: 4096
          x-yafvs-max-bytes: 4096
          description: Optional report filter text, bounded to 4096 UTF-8 bytes after normalization.
        filter_id:
          type: string
          format: uuid
      allOf:
        - not:
            required: [filter, filter_id]
    AlertEmailCreateRequest:
      type: object
      additionalProperties: false
      required: [method, name, active, status, to_address, subject, notice]
      description: Strict write-only delivery contract for fixed TASK_RUN_STATUS_CHANGED + ALWAYS + EMAIL alert creation. Simple notices forbid report-format selection but may carry a plain-text message. Include and attach notices require a report format and may include a message.
      properties:
        method:
          type: string
          const: EMAIL
        name:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        comment:
          type: string
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        active:
          type: boolean
        status:
          type: string
          maxLength: 32
          x-yafvs-max-bytes: 32
          enum: [Delete Requested, Ultimate Delete Requested, Ultimate Delete Waiting, Delete Waiting, Done, New, Requested, Running, Queued, Stop Requested, Stop Waiting, Stopped, Processing, Interrupted]
        to_address:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
          writeOnly: true
        from_address:
          type: string
          maxLength: 4096
          x-yafvs-max-bytes: 4096
          writeOnly: true
        subject:
          type: string
          minLength: 1
          maxLength: 80
          x-yafvs-max-bytes: 80
          writeOnly: true
        notice:
          type: string
          enum: [simple, include, attach]
        recipient_credential_id:
          type: string
          format: uuid
          maxLength: 36
          x-yafvs-max-bytes: 36
          writeOnly: true
        report_format_id:
          type: string
          format: uuid
          maxLength: 36
          x-yafvs-max-bytes: 36
          writeOnly: true
        message:
          type: string
          maxLength: 2000
          x-yafvs-max-bytes: 2000
          writeOnly: true
          description: Optional message body for any notice mode. CR, LF, and tab are preserved; other control characters are rejected.
      oneOf:
        - properties:
            notice:
              const: simple
          not:
            anyOf:
              - required: [report_format_id]
        - properties:
            notice:
              enum: [include, attach]
          required: [report_format_id]
    AlertScpCreateRequest:
      type: object
      additionalProperties: false
      required: [method, name, active, status, scp_credential_id, scp_host, scp_port, scp_known_hosts, scp_path, report_format_id]
      description: Strict write-only delivery contract for fixed TASK_RUN_STATUS_CHANGED + ALWAYS + SCP alert creation. The SSH credential and report format are resolved and locked under the request operator before the alert is inserted. Explicit known-hosts content is mandatory; delivery does not fall back to ambient host-key stores.
      properties:
        method:
          type: string
          const: SCP
        name:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        comment:
