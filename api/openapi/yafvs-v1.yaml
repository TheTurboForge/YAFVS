      properties:
        resource_type:
          type: string
          const: port_list
        search:
          type: string
          maxLength: 4096
          description: Optional literal case-insensitive search over port-list UUID, name, and comment. This is data, not a filter expression.
        predefined:
          type: boolean
          description: Optional exact predefined-state predicate.
        expected_count:
          type: integer
          minimum: 1
          maximum: 100000
          description: Number of rows shown as matching when the operator confirmed the action. The transaction fails on drift before mutation.
    TagUserResourceSelection:
      type: object
      required: [resource_type, expected_count]
      additionalProperties: false
      properties:
        resource_type:
          type: string
          const: user
        search:
          type: string
          maxLength: 4096
          description: Optional literal case-insensitive search over user UUID, name, and comment. This is data, not a filter expression.
        expected_count:
          type: integer
          minimum: 1
          maximum: 100000
          description: Number of rows shown as matching when the operator confirmed the action. The transaction fails on drift before mutation.
    TagTargetResourceSelection:
      type: object
      required: [resource_type, expected_count]
      additionalProperties: false
      properties:
        resource_type:
          type: string
          const: target
        search:
          type: string
          maxLength: 4096
          description: Optional literal case-insensitive search over exact target UUID or partial target name, comment, port-list name, and hosts. This is data, not a filter expression.
        expected_count:
          type: integer
          minimum: 1
          maximum: 100000
          description: Number of rows shown as matching when the operator confirmed the action. The transaction fails on drift before mutation.
    TagScannerResourceSelection:
      type: object
      required: [resource_type, expected_count]
      additionalProperties: false
      properties:
        resource_type:
          type: string
          const: scanner
        search:
          type: string
          maxLength: 4096
          description: Optional literal case-insensitive search over scanner UUID, name, comment, host, credential name, and relay host. This is data, not a filter expression.
        expected_count:
          type: integer
          minimum: 1
          maximum: 100000
          description: Number of rows shown as matching when the operator confirmed the action. The transaction fails on drift before mutation.
    TagCredentialResourceSelection:
      type: object
      required: [resource_type, expected_count]
      additionalProperties: false
      properties:
        resource_type:
          type: string
          const: credential
        search:
          type: string
          maxLength: 4096
          description: Optional literal case-insensitive search over credential UUID, name, comment, owner name, and credential type. This is data, not a filter expression.
        credential_type:
          type: string
          maxLength: 4096
          description: Optional exact credential type predicate.
        expected_count:
          type: integer
          minimum: 1
          maximum: 100000
          description: Number of rows shown as matching when the operator confirmed the action. The transaction fails on drift before mutation.
    TagResourceCollection:
      type: object
      required: [tag_id, resource_type, page, items]
      properties:
        tag_id:
