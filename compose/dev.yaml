name: yafvs

services:
  postgres:
    build:
      context: ..
      dockerfile: docker/runtime/postgres/Dockerfile
    image: yafvs-postgres-dev
    restart: unless-stopped
    environment:
      LD_LIBRARY_PATH: /yafvs-prefix/lib:/yafvs-prefix/lib64
      POSTGRES_USER: ${POSTGRES_USER:-yafvs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yafvs-dev}
      POSTGRES_DB: ${POSTGRES_DB:-yafvs}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/postgres
        target: /var/lib/postgresql/data
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/logs/postgres
        target: /var/log/postgresql
      - type: bind
        source: ../build/prefix
        target: /yafvs-prefix
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-openvas:
    image: redis:7-bookworm
    restart: unless-stopped
    user: "${YAFVS_UID:-1000}:${YAFVS_GID:-1000}"
    command:
      - sh
      - -lc
      - >
        mkdir -p /run/redis-openvas /data /logs &&
        rm -f /run/redis-openvas/redis.sock &&
        exec redis-server
        --port 0
        --databases 128
        --unixsocket /run/redis-openvas/redis.sock
        --unixsocketperm 770
        --dir /data
        --appendonly yes
        --pidfile /run/redis-openvas/redis-server.pid
        --logfile /logs/redis-openvas.log
    volumes:
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/redis-openvas
        target: /data
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/redis-openvas
        target: /run/redis-openvas
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/logs/redis-openvas
        target: /logs
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -s /run/redis-openvas/redis.sock ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    user: "${YAFVS_UID:-1000}:${YAFVS_GID:-1000}"
    command:
      - sh
      - -ec
      - >
        umask 077 &&
        test -s /run/secrets/yafvs-mqtt-openvas-password &&
        test -s /run/secrets/yafvs-mqtt-notus-password &&
        test -s /run/secrets/yafvs-mqtt-ospd-password &&
        test -s /run/secrets/yafvs-mqtt-health-password &&
        cp /mosquitto/config-source/mosquitto.acl /mosquitto/config-secrets/mosquitto.acl &&
        chmod 600 /mosquitto/config-secrets/mosquitto.acl &&
        printf 'openvas:%s\nnotus:%s\nospd:%s\nhealth:%s\n'
        "$(cat /run/secrets/yafvs-mqtt-openvas-password)"
        "$(cat /run/secrets/yafvs-mqtt-notus-password)"
        "$(cat /run/secrets/yafvs-mqtt-ospd-password)"
        "$(cat /run/secrets/yafvs-mqtt-health-password)"
        > /mosquitto/config-secrets/passwords &&
        chmod 600 /mosquitto/config-secrets/passwords &&
        mosquitto_passwd -U /mosquitto/config-secrets/passwords &&
        printf '%s\n'
        '-h 127.0.0.1'
        '-p 1883'
        '-u health'
        "-P $(cat /run/secrets/yafvs-mqtt-health-password)"
        '-t yafvs/health'
        '-m ok'
        > /tmp/yafvs-mqtt-health.options &&
        chmod 600 /tmp/yafvs-mqtt-health.options &&
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - type: bind
        source: ../docker/runtime/mosquitto.conf
        target: /mosquitto/config/mosquitto.conf
        read_only: true
      - type: bind
        source: ../docker/runtime/mosquitto.acl
        target: /mosquitto/config-source/mosquitto.acl
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/mosquitto/secrets
        target: /mosquitto/config-secrets
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/secrets/mqtt-openvas-password
        target: /run/secrets/yafvs-mqtt-openvas-password
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/secrets/mqtt-notus-password
        target: /run/secrets/yafvs-mqtt-notus-password
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/secrets/mqtt-ospd-password
        target: /run/secrets/yafvs-mqtt-ospd-password
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/secrets/mqtt-health-password
        target: /run/secrets/yafvs-mqtt-health-password
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/mosquitto/data
        target: /mosquitto/data
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/logs/mosquitto
        target: /mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-o", "/tmp/yafvs-mqtt-health.options"]
      interval: 5s
      timeout: 5s
      retries: 20

  dev-shell:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    user: "${YAFVS_UID:-1000}:${YAFVS_GID:-1000}"
    environment:
      HOME: /tmp
      CCACHE_DIR: /workspace/build/ccache
      CMAKE_GENERATOR: Ninja
      YAFVS_RUNTIME_DIR: /runtime
    volumes:
      - type: bind
        source: ..
        target: /workspace
      - type: bind
        source: ..
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}
        target: /runtime
      - type: bind
        source: ../build
        target: /workspace/build
    command: ["sleep", "infinity"]

  gvmd:
    profiles: ["app"]
    image: yafvs-gvmd
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    user: "${YAFVS_UID:-1000}:${YAFVS_GID:-1000}"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      HOME: /tmp
      LD_LIBRARY_PATH: /workspace/build/prefix/lib:/workspace/build/prefix/lib64
      PATH: /workspace/build/prefix/sbin:/workspace/build/prefix/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PGPASSWORD: ${POSTGRES_PASSWORD:-yafvs-dev}
      POSTGRES_USER: ${POSTGRES_USER:-yafvs}
      POSTGRES_DB: ${POSTGRES_DB:-yafvs}
      YAFVS_RUNTIME_DIR: /runtime
      YAFVS_GVMD_CONTROL_SECRET: ${YAFVS_GVMD_CONTROL_SECRET:-}
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - type: bind
        source: ..
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/feed-store/current
        target: /runtime/feeds
        bind:
          create_host_path: false
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/feed-update.lock
        target: /runtime/run/feed-update.lock
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/gvmd-gmp
        target: /runtime/run/gvmd-gmp
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/gvmd-control
        target: /runtime/run/gvmd-control
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/gvmd
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}/build/run/gvmd
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/ospd
        target: /runtime/run/ospd
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/logs/gvmd
        target: /runtime/logs/gvmd
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/logs/gvmd
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}/build/logs
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/state/gvmd
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}/build/var/lib/gvm/gvmd
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/state/gvmd-bind-files/gvmd.sem
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}/build/var/lib/gvm/gvmd.sem
      - type: bind
        source: ../build
        target: /workspace/build
        read_only: true
    command:
      - sh
      - -lc
      - >
        mkdir -p /runtime/run/gvmd-gmp /runtime/run/gvmd-control /runtime/logs/gvmd &&
        rm -f /runtime/run/gvmd-gmp/gvmd.sock /runtime/run/gvmd-control/yafvs-control.sock &&
        exec gvmd --foreground
        --database="$${POSTGRES_DB:-yafvs}"
        --db-host=postgres
        --db-port=5432
        --db-user="$${POSTGRES_USER:-yafvs}"
        --feed-lock-path=/runtime/run/feed-update.lock
        --disable-scheduling
        --scan-queue
        --max-active-scan-handlers=1
        --unix-socket=/runtime/run/gvmd-gmp/gvmd.sock
        --yafvs-control-socket=/runtime/run/gvmd-control/yafvs-control.sock
        --listen-mode=0660

  ospd-openvas:
    profiles: ["app"]
    image: yafvs-ospd-openvas
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    init: true
    hostname: yafvs-ospd-openvas
    working_dir: /workspace
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      redis-openvas:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      HOME: /tmp
      GNUPGHOME: /runtime/state/feed-gnupg
      LD_LIBRARY_PATH: /workspace/build/prefix/lib:/workspace/build/prefix/lib64
      PATH: /workspace/build/venvs/ospd-openvas/bin:/workspace/build/openvas-scanner/src:/workspace/build/prefix/sbin:/workspace/build/prefix/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      YAFVS_RUNTIME_DIR: /runtime
      YAFVS_UID: ${YAFVS_UID:-1000}
      YAFVS_GID: ${YAFVS_GID:-1000}
      NMAP_PRIVILEGED: "1"
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - type: bind
        source: ..
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/ospd
        target: /runtime/run/ospd
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/redis-openvas
        target: /runtime/run/redis-openvas
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/certs
        target: /runtime/certs
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/logs/ospd
        target: /runtime/logs/ospd
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/state/feed-gnupg
        target: /runtime/state/feed-gnupg
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/feed-store/current
        target: /runtime/feeds
        bind:
          create_host_path: false
        read_only: true
      - type: bind
        source: ../build
        target: /workspace/build
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/state/ospd/openvas.conf
        target: /workspace/build/prefix/etc/openvas/openvas.conf
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/state/ospd/result-spool
        target: /runtime/state/ospd/result-spool
        bind:
          create_host_path: false
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/secrets/mqtt-ospd-password
        target: /run/secrets/yafvs-mqtt-ospd-password
        read_only: true
    command:
      - sh
      - -lc
      - >
        install -d -m 0770 -o "$${YAFVS_UID:-1000}" -g "$${YAFVS_GID:-1000}" /runtime/run/ospd /runtime/logs/ospd &&
        install -d -m 0700 -o "$${YAFVS_UID:-1000}" -g "$${YAFVS_GID:-1000}" /runtime/state/feed-gnupg &&
        install -d -m 0700 -o "$${YAFVS_UID:-1000}" -g "$${YAFVS_GID:-1000}" /runtime/state/ospd/result-spool &&
        mkdir -p /runtime/feeds/notus/advisories &&
        if command -v setcap >/dev/null 2>&1; then
          setcap cap_net_raw,cap_net_admin+eip /usr/bin/nmap ||
          echo "WARN: could not set nmap file capabilities" >&2;
        else
          echo "WARN: setcap is unavailable; nmap capability check will fail" >&2;
        fi &&
        rm -f /runtime/run/ospd/ospd-openvas.sock /runtime/run/ospd/ospd-openvas.pid &&
        exec setpriv
        --reuid "$${YAFVS_UID:-1000}"
        --regid "$${YAFVS_GID:-1000}"
        --clear-groups
        --inh-caps +net_raw,+net_admin
        --ambient-caps +net_raw,+net_admin
        /workspace/build/venvs/ospd-openvas/bin/ospd-openvas --foreground
        --unix-socket=/runtime/run/ospd/ospd-openvas.sock
        --pid-file=/runtime/run/ospd/ospd-openvas.pid
        --lock-file-dir=/runtime/run/ospd
        --result-spool-dir=/runtime/state/ospd/result-spool
        --socket-mode=0o770
        --key-file=/runtime/certs/private/CA/serverkey.pem
        --cert-file=/runtime/certs/CA/servercert.pem
        --ca-file=/runtime/certs/CA/cacert.pem
        --log-file=/runtime/logs/ospd/ospd-openvas.log
        --mqtt-broker-address=mosquitto
        --mqtt-broker-port=1883
        --mqtt-broker-username=ospd
        --mqtt-broker-password-file=/run/secrets/yafvs-mqtt-ospd-password
        --max-scans=0
        --notus-feed-dir=/runtime/feeds/notus/advisories

  notus-scanner:
    profiles: ["app"]
    image: yafvs-notus-scanner
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    user: "${YAFVS_UID:-1000}:${YAFVS_GID:-1000}"
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      HOME: /tmp
      GNUPGHOME: /runtime/state/feed-gnupg
      LD_LIBRARY_PATH: /workspace/build/prefix/lib:/workspace/build/prefix/lib64
      PATH: /workspace/build/venvs/notus-scanner/bin:/workspace/build/prefix/sbin:/workspace/build/prefix/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      YAFVS_RUNTIME_DIR: /runtime
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - type: bind
        source: ..
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/notus
        target: /runtime/run/notus
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/logs/notus
        target: /runtime/logs/notus
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/state/feed-gnupg
        target: /runtime/state/feed-gnupg
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/feed-store/current
        target: /runtime/feeds
        bind:
          create_host_path: false
        read_only: true
      - type: bind
        source: ../build
        target: /workspace/build
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/secrets/mqtt-notus-password
        target: /run/secrets/yafvs-mqtt-notus-password
        read_only: true
    command:
      - sh
      - -lc
      - >
        mkdir -p /runtime/run/notus /runtime/logs/notus /runtime/feeds/notus/products /runtime/state/feed-gnupg &&
        chmod 700 /runtime/state/feed-gnupg &&
        rm -f /runtime/run/notus/notus-scanner.pid &&
        exec /workspace/build/venvs/notus-scanner/bin/notus-scanner --foreground
        --products-directory=/runtime/feeds/notus/products
        --mqtt-broker-address=mosquitto
        --mqtt-broker-port=1883
        --mqtt-broker-username=notus
        --mqtt-broker-password-file=/run/secrets/yafvs-mqtt-notus-password
        --pid-file=/runtime/run/notus/notus-scanner.pid
        --log-file=/runtime/logs/notus/notus-scanner.log
        --log-level=INFO

  gsad:
    profiles: ["app"]
    image: yafvs-gsad
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    user: "${YAFVS_UID:-1000}:${YAFVS_GID:-1000}"
    depends_on:
      gvmd:
        condition: service_started
    environment:
      HOME: /tmp
      LD_LIBRARY_PATH: /workspace/build/prefix/lib:/workspace/build/prefix/lib64
      PATH: /workspace/build/prefix/sbin:/workspace/build/prefix/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      YAFVS_RUNTIME_DIR: /runtime
      YAFVS_API_BROWSER_PROXY_SECRET: ${YAFVS_API_BROWSER_PROXY_SECRET:-}
    ports:
      - "${YAFVS_GSAD_HOST:-127.0.0.1}:19392:9392"
    volumes:
      - type: bind
        source: ..
        target: /workspace
        read_only: true
      - type: bind
        source: ..
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/gvmd-gmp
        target: /runtime/run/gvmd
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/certs
        target: /runtime/certs
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/logs/gsad
        target: /runtime/logs/gsad
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/logs/gsad
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}/build/logs
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/gsad
        target: ${YAFVS_REPO_MOUNT_PATH:?set YAFVS_REPO_MOUNT_PATH to the absolute checkout path}/build/run/gsad
      - type: bind
        source: ../build
        target: /workspace/build
        read_only: true
    command:
      - sh
      - -lc
      - >
        mkdir -p /runtime/logs/gsad &&
        exec gsad --foreground
        --listen=0.0.0.0
        --port=9392
        --munix-socket=/runtime/run/gvmd/gvmd.sock
        --ssl-private-key=/runtime/certs/private/CA/serverkey.pem
        --ssl-certificate=/runtime/certs/CA/servercert.pem
        --no-redirect
        --static-content=/workspace/build/prefix/share/gvm/gsad/web

  yafvs-api:
    profiles: ["app"]
    image: yafvs-yafvs-api
    build:
      context: ..
      dockerfile: docker/yafvs-api/Dockerfile
    depends_on:
      gvmd:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-yafvs}:${POSTGRES_PASSWORD:-yafvs-dev}@postgres:5432/${POSTGRES_DB:-yafvs}
      RUST_LOG: ${YAFVS_API_LOG:-info}
      YAFVS_API_BIND: 0.0.0.0:9080
      YAFVS_API_DIRECT_BIND: ${YAFVS_API_DIRECT_BIND:-}
      YAFVS_API_BEARER_TOKEN: ${YAFVS_API_BEARER_TOKEN:-}
      YAFVS_API_BEARER_TOKEN_FILE: ${YAFVS_API_BEARER_TOKEN_FILE:-}
      YAFVS_API_OPERATOR_UUID: ${YAFVS_API_OPERATOR_UUID:-}
      YAFVS_API_OPERATOR_NAME: ${YAFVS_API_OPERATOR_NAME:-}
      YAFVS_API_DIRECT_WRITE_CONTROL: ${YAFVS_API_DIRECT_WRITE_CONTROL:-}
      YAFVS_API_BROWSER_PROXY_SECRET: ${YAFVS_API_BROWSER_PROXY_SECRET:-}
      YAFVS_API_GVMD_CONTROL_SOCKET: /runtime/run/gvmd/yafvs-control.sock
      YAFVS_GVMD_CONTROL_SECRET: ${YAFVS_GVMD_CONTROL_SECRET:-}
      YAFVS_FEED_METADATA_DIR: /runtime/feeds
      YAFVS_FEED_LOCK_DIR: /runtime/run
    volumes:
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/feed-store/current
        target: /runtime/feeds
        bind:
          create_host_path: false
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/feed-update.lock
        target: /runtime/run/feed-update.lock
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/ospd
        target: /runtime/run/ospd
        read_only: true
      - type: bind
        source: ${YAFVS_RUNTIME_DIR:-../../YAFVS-runtime}/run/gvmd-control
        target: /runtime/run/gvmd
        read_only: true
    # No host port by default. Direct API exposure is added only by the
    # generated opt-in direct-API override used by yafvsctl.

networks:
  default:
    name: yafvs-dev
