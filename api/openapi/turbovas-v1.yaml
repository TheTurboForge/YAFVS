      operationId: getScopesByScopeIdReportsByScopeReportIdRetentionPlan
      summary: Preview non-destructive scope report retention state
      description: Read-only dry-run scaffold for future tiered raw-report detail retention. It does not compact, delete, or mutate report evidence.
      x-turbovas-direct: true
      x-turbovas-exposure: direct-read
      x-turbovas-maturity: preview-read
      x-turbovas-replaces: none
      x-turbovas-inherited-still-owns: retention-mutations
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
      responses:
        '200':
          description: Scope report retention preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopeReportRetentionPlan'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    operatorSession:
      type: apiKey
      in: cookie
      name: turbovas_session
      description: Authenticated same-origin operator session used by the GSA/gsad browser proxy.
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token for the opt-in direct native API development listener.
  responses:
    BadRequest:
      description: Request parameters, path values, or request shape are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication is missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested native API resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: The native API request conflicts with existing persistent state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowed:
      description: The endpoint supports only the documented HTTP method.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RequestTooLarge:
      description: The direct native API request exceeded the accepted size limits.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: The direct native API listener is handling too many concurrent requests.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: The native API could not complete the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    Sort:
      name: sort
      in: query
      schema:
        type: string
    Filter:
      name: filter
      in: query
      schema:
        type: string
        maxLength: 4096
    FilterType:
      name: filter_type
      in: query
      description: Exact saved-filter resource type, for example result, report, target, or task.
      schema:
        type: string
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Optional client correlation ID for the direct bearer listener. Invalid, empty, or oversized values are replaced by a generated ID.
      schema:
        type: string
        maxLength: 128
        pattern: '^[A-Za-z0-9_.:-]+$'
    ReportId:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResultId:
      name: result_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CveId:
      name: cve_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^CVE-[0-9]{4}-[0-9]{4,}$'
    CpeId:
      name: cpe_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^cpe:.+'
    NvtId:
      name: nvt_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^([0-9]+\.)+[0-9]+$'
        maxLength: 128
    OperatingSystemId:
      name: os_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    HostId:
      name: host_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TlsCertificateId:
      name: certificate_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScannerId:
      name: scanner_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CredentialId:
      name: credential_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScopeId:
      name: scope_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScopeReportId:
      name: scope_report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TargetId:
      name: target_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FilterId:
      name: filter_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AlertId:
      name: alert_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TagId:
      name: tag_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OverrideId:
      name: override_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PortListId:
      name: port_list_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScheduleId:
      name: schedule_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScanConfigId:
      name: scan_config_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportFormatId:
      name: report_format_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportConfigId:
      name: report_config_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertBundAdvisoryId:
      name: cert_bund_advisory_id
      in: path
      required: true
      description: CERT-Bund advisory identifier as stored in gvmd/PostgreSQL. Slash characters must be URL-encoded when used as a path segment.
      schema:
        type: string
        maxLength: 256
        pattern: '^[A-Za-z0-9._:/-]+$'
    DfnCertAdvisoryId:
      name: dfn_cert_advisory_id
      in: path
      required: true
      description: DFN-CERT advisory identifier as stored in gvmd/PostgreSQL.
      schema:
        type: string
        maxLength: 256
        pattern: '^[A-Za-z0-9._:/-]+$'
  headers:
    RequestId:
      description: Request correlation ID returned by the direct bearer listener.
      schema:
        type: string
        maxLength: 128
        pattern: '^[A-Za-z0-9_.:-]+$'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    PageInfo:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        sort:
          type: string
        filter:
          type: string
    ReportCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Report'
    ScopeCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Scope'
    ScopeCreateRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        port_ranges:
          type: array
          minItems: 1
          maxItems: 1024
          items:
            $ref: '#/components/schemas/PortListCreateRangeRequest'
        protection_requirement:
          enum: [normal, high, very_high]
        target_ids:
          type: array
          items:
            type: string
            format: uuid
          uniqueItems: true
        host_ids:
          type: array
          items:
            type: string
            format: uuid
          uniqueItems: true
    ScopePatchRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        filter_type:
          type: string
          maxLength: 4096
          description: Optional saved-filter resource type such as task, result, info, report, or target. Pretty names are normalized to database type names. Rejected for filters referenced by live alerts.
        term:
          type: string
          maxLength: 4096
          description: Optional saved-filter term stored as operator configuration data. Rejected for filters referenced by live alerts.
        protection_requirement:
          enum: [normal, high, very_high]
        target_ids:
          type: array
          items:
            type: string
            format: uuid
          uniqueItems: true
        host_ids:
          type: array
          items:
            type: string
            format: uuid
          uniqueItems: true
    ScopeReportCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScopeReport'
    TargetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Target'
    TargetCreateRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - alive_tests
        - allow_simultaneous_ips
        - reverse_lookup_only
        - reverse_lookup_unify
        - port_list_id
        - hosts
      properties:
        name:
          type: string
          maxLength: 4096
          description: Target name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: Optional target comment. Blank comments are stored as empty after trimming.
        alive_tests:
          type: array
          minItems: 1
          description: Alive-test labels to store as the inherited target alive-test bitfield. Use exactly Scan Config Default, exactly Consider Alive, or one or more probe labels.
          items:
            type: string
            enum:
              - Scan Config Default
              - Consider Alive
              - TCP-ACK Service Ping
              - ICMP Ping
              - ARP Ping
              - TCP-SYN Service Ping
        allow_simultaneous_ips:
          type: boolean
          description: Whether multiple IPs for the same DNS name may be scanned.
        reverse_lookup_only:
          type: boolean
          description: Whether to scan only hosts with reverse DNS names.
        reverse_lookup_unify:
          type: boolean
          description: Whether to scan only one IP when multiple IPs resolve to the same name.
        port_list_id:
          type: string
          format: uuid
          description: Existing port list to assign to the target. The referenced port list must be predefined or owned by the direct operator.
        hosts:
          type: array
          minItems: 1
          maxItems: 4095
          description: Simple explicit host entries to assign to the target. CIDR/range grammar remains inherited until separately implemented.
          items:
            type: string
            maxLength: 4096
        exclude_hosts:
          type: array
          description: Simple explicit host entries to exclude from hosts in the same request. Cannot fully exclude the target.
          items:
            type: string
            maxLength: 4096
    TargetPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          maxLength: 4096
          description: New target name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: New target comment. Blank comments clear the comment after trimming.
        alive_tests:
          type: array
          description: Alive-test labels to store as the inherited target alive-test bitfield. Use exactly Scan Config Default, exactly Consider Alive, or one or more probe labels.
          items:
            type: string
            enum:
              - Scan Config Default
              - Consider Alive
              - TCP-ACK Service Ping
              - ICMP Ping
              - ARP Ping
              - TCP-SYN Service Ping
        allow_simultaneous_ips:
          type: boolean
          description: Whether multiple IPs for the same DNS name may be scanned. Rejected while the target is referenced by a live task.
        reverse_lookup_only:
          type: boolean
          description: Whether to scan only hosts with reverse DNS names. Rejected while the target is referenced by a live task.
        reverse_lookup_unify:
          type: boolean
          description: Whether to scan only one IP when multiple IPs resolve to the same name. Rejected while the target is referenced by a live task.
        port_list_id:
          type: string
          format: uuid
          description: Port list to assign to the target. The referenced port list must be predefined or owned by the direct operator, and assignment is rejected while the target is referenced by a live task.
        hosts:
          type: array
          maxItems: 4095
          description: Simple explicit host entries to assign to the target. CIDR/range grammar remains inherited until separately implemented. Rejected while the target is referenced by a live task.
          items:
            type: string
            maxLength: 4096
        exclude_hosts:
          type: array
          description: Simple explicit host entries to exclude from hosts in the same request. Cannot fully exclude the target. Rejected while the target is referenced by a live task.
          items:
            type: string
            maxLength: 4096
    TargetCloneRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 4096
          description: Optional clone name. Blank names are rejected after trimming; if omitted, the database generates an inherited-style unique clone name.
        comment:
          type: string
          maxLength: 4096
          description: Optional clone comment. If omitted, the source target comment is copied.
    TaskPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          maxLength: 4096
          description: New task name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: New task comment. Blank comments clear the comment after trimming.
    TaskCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
    ResultCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Result'
    VulnerabilityCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Vulnerability'
    CatalogCveCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogCve'
    CatalogCpeCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogCpe'
    DfnCertAdvisoryCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/DfnCertAdvisory'
    CertBundAdvisoryCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CertBundAdvisory'
    NvtCatalogCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/NvtCatalogItem'
    ReportHostCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportHost'
    HostCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Host'
    PortCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Port'
    ApplicationCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Application'
    OperatingSystemCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OperatingSystem'
    OperatingSystemAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OperatingSystemAsset'
    HostAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/HostAsset'
    HostAssetDetail:
      type: object
      required: [asset, identifiers, operating_systems, details]
      properties:
        asset:
          $ref: '#/components/schemas/HostAsset'
        identifiers:
          type: array
          description: Safe host identifiers from gvmd asset state. Credential/privacy-sensitive identifier names are intentionally excluded.
          items:
            $ref: '#/components/schemas/HostAssetDetailIdentifier'
        operating_systems:
          type: array
          items:
            $ref: '#/components/schemas/HostAssetOperatingSystem'
        details:
          type: array
          description: 'Latest whitelisted host detail rows only: best_os_cpe, best_os_txt, and traceroute.'
          items:
            $ref: '#/components/schemas/HostAssetDetailMetadata'
        user_tags:
          type: array
          description: Active user tags attached directly to this host asset. Write/tag actions remain inherited.
          items:
            $ref: '#/components/schemas/ReportUserTag'
    TlsCertificateAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TlsCertificateAsset'
    TlsCertificateAssetDetail:
      allOf:
        - $ref: '#/components/schemas/TlsCertificateAsset'
        - type: object
          required: [sources]
          properties:
            sources:
              type: array
              items:
                $ref: '#/components/schemas/TlsCertificateSource'
            user_tags:
              type: array
              description: Active user tags attached directly to this TLS certificate asset. Write/tag actions remain inherited.
              items:
                $ref: '#/components/schemas/ReportUserTag'
    ScannerAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScannerAsset'
    ScannerAssetDetail:
      allOf:
        - $ref: '#/components/schemas/ScannerAsset'
        - type: object
          properties:
            tasks:
              type: array
              description: Non-hidden task backlinks that use this scanner. Scanner control remains inherited.
              items:
                $ref: '#/components/schemas/ScannerTaskReference'
            user_tags:
              type: array
              description: Active user tags attached directly to this scanner. Write/tag actions remain inherited.
              items:
                $ref: '#/components/schemas/ReportUserTag'
    CredentialAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CredentialAsset'
    CredentialUsageReference:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        use_type:
          type: string
          description: Non-secret relationship kind, such as target login-data type or scanner.
        port:
          type: integer
          nullable: true
          description: Non-secret credential-use port where the relationship records one.
    CredentialAsset:
      type: object
      required: [id, name, owner, credential_type, allow_insecure, target_count, scanner_count, targets, scanners]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        comment:
          type: string
        owner:
          type: string
        credential_type:
          type: string
          description: Internal credential kind only; secret material is never returned by this native endpoint.
        allow_insecure:
          type: boolean
        target_count:
          type: integer
        scanner_count:
          type: integer
        targets:
          type: array
          description: Target backlinks by id/name/use type only. Target host data and credential secret data are not returned here.
          items:
            $ref: '#/components/schemas/CredentialUsageReference'
        scanners:
          type: array
          description: Scanner backlinks by id/name only. Scanner CA material and credential secret data are not returned here.
          items:
            $ref: '#/components/schemas/CredentialUsageReference'
        created_at:
          type: string
          format: date-time
        modified_at:
          type: string
          format: date-time
    ScanConfigAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScanConfigAsset'
    ScanConfigTaskReference:
      type: object
      required: [id, name, usage_type]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        usage_type:
          type: string
          enum: [scan]
    ScanConfigAssetDetail:
      allOf:
        - $ref: '#/components/schemas/ScanConfigAsset'
        - type: object
          properties:
            tasks:
              type: array
              description: Non-hidden task backlinks that use this scan config. Task control remains inherited.
              items:
                $ref: '#/components/schemas/ScanConfigTaskReference'
            user_tags:
              type: array
              description: Active user tags attached directly to this scan config. Write/tag actions remain inherited.
              items:
                $ref: '#/components/schemas/ReportUserTag'
    FilterAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/FilterAsset'
    AlertAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/AlertAsset'
    FeedInventory:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FeedItem'
    FeedCurrentlySyncing:
      type: object
      properties:
        timestamp:
          type: string
          description: Timestamp text read from the inherited feed lock file when a sync/update lock is active.
    FeedItem:
      type: object
      required: [name, version, type, status, sync_status, metadata_source, status_source]
      properties:
        name:
          type: string
        version:
          type: string
        type:
          type: string
          enum: [NVT, SCAP, CERT, GVMD_DATA]
