      x-yafvs-owner-semantics: request-operator-owner
      summary: Preview permanent Trashcan deletion
      description: Returns counts and a SHA-256 identity digest for the exact base resource families that gvmd will permanently delete for the authenticated operator. The direct bearer path requires configured write control and a bound operator identity; the same-origin browser path resolves the operator from the authenticated internal proxy headers. All count branches are owner-scoped and include zero-count rows. Child rows deleted as consequences of the base resources are not counted separately.
      security:
