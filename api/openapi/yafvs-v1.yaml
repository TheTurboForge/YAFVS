      operationId: getDfnCertAdvisoriesByDfnCertAdvisoryId
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: dfn-cert-advisory-catalog-detail-read
      summary: Read one Security Information DFN-CERT advisory catalog entry
      description: Catalog-detail metadata backed by CERT feed metadata imported into gvmd/PostgreSQL plus read-only rich advisory links parsed from the mounted CERT feed copy.
      parameters:
        - $ref: '#/components/parameters/DfnCertAdvisoryId'
      responses:
        '200':
          description: DFN-CERT advisory catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DfnCertAdvisoryDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /dfn-cert-advisories/{dfn_cert_advisory_id}/export:
    get:
      operationId: getDfnCertAdvisoriesByDfnCertAdvisoryIdExport
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: dfn-cert-advisory-metadata-export-read
      summary: Export one DFN-CERT advisory metadata record
