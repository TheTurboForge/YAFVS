        items:
          type: array
          items:
            $ref: '#/components/schemas/Host'
    PortCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Port'
    ApplicationCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Application'
    OperatingSystemCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OperatingSystem'
    OperatingSystemAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OperatingSystemAsset'
    HostAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/HostAsset'
    TlsCertificateAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TlsCertificateAsset'
    ScannerAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScannerAsset'
    ScanConfigAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScanConfigAsset'
    FilterAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/FilterAsset'
    TagAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TagAsset'
    OverrideAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OverrideAsset'
    PortListAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/PortListAsset'
    ScheduleAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleAsset'
    ReportConfigAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportConfigAsset'
    ReportFormatAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportFormatAsset'
    CveCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Cve'
    TlsCertificateCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TlsCertificate'
    ErrorMessageCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ErrorMessage'
    Report:
      type: object
      required: [id, name, status, result_count, vulnerability_count, host_count, cve_count, severity, max_severity]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        task:
          $ref: '#/components/schemas/ReportReference'
        target:
          $ref: '#/components/schemas/ReportReference'
        creation_time:
          type: string
          format: date-time
        modification_time:
          type: string
          format: date-time
        scan_start:
          type: string
          format: date-time
        scan_end:
          type: string
          format: date-time
        severity:
          $ref: '#/components/schemas/ReportSeverityCounts'
        max_severity:
          type: number
        result_count:
          type: integer
        vulnerability_count:
          type: integer
        host_count:
          type: integer
        cve_count:
          type: integer
    ReportReference:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    ReportSeverityCounts:
      type: object
      required: [critical, high, medium, low, log, false_positive]
      properties:
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        log:
          type: integer
        false_positive:
          type: integer
    Scope:
      type: object
      required: [id, name, protection_requirement, protection_requirement_label, predefined, global, target_count, host_count, scope_report_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        comment:
          type: string
        protection_requirement:
          enum: [normal, high, very_high]
        protection_requirement_label:
          enum: [Normal, High, Very High]
        predefined:
          type: boolean
        global:
          type: boolean
        creation_time:
          type: string
          format: date-time
        modification_time:
          type: string
          format: date-time
        target_count:
          type: integer
        host_count:
          type: integer
        scope_report_count:
          type: integer
        targets:
          type: array
          items:
            $ref: '#/components/schemas/ScopeEntity'
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/ScopeEntity'
        candidate_hosts:
          type: array
          items:
            $ref: '#/components/schemas/ScopeCandidateHost'
        scope_reports:
          type: array
          items:
            $ref: '#/components/schemas/ScopeReportReference'
    ScopeEntity:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    ScopeCandidateHost:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        target_id:
          type: string
          format: uuid
        target_name:
          type: string
        source_report_id:
          type: string
          format: uuid
    ScopeReportReference:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        creation_time:
          type: string
          format: date-time
        latest_evidence_time:
          type: string
          format: date-time
        source_report_count:
          type: integer
        member_host_count:
          type: integer
        evidence_host_count:
          type: integer
        missing_host_count:
          type: integer
        result_count:
          type: integer
        vulnerability_count:
          type: integer
        max_severity:
          type: number
    ScopeReport:
      type: object
      required: [id, name, status, scope, source_report_count, result_count, vulnerability_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        scope:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        protection_requirement:
          enum: [Normal, High, Very High]
        source_report_count:
          type: integer
        source_target_count:
          type: integer
        member_host_count:
          type: integer
        evidence_host_count:
          type: integer
        missing_host_count:
          type: integer
        result_count:
          type: integer
        vulnerability_count:
          type: integer
        severity:
          $ref: '#/components/schemas/SeverityCounts'
        max_severity:
          type: number
        latest_evidence_time:
          type: string
          format: date-time
        excluded_candidate_host_count:
          type: integer
        creation_time:
          type: string
          format: date-time
        modification_time:
          type: string
          format: date-time
    ScopeReportRetentionPlan:
      type: object
      required: [id, name, scope, policy, summary, sources]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        scope:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        generated_at:
          type: string
          format: date-time
        policy:
          type: object
          required: [mode, destructive_actions, latest_completed_raw_report_retains_full_detail, detail_compacted_field, aggregate_only_field]
          properties:
            mode:
              enum: [dry_run_preview]
            destructive_actions:
              type: boolean
            latest_completed_raw_report_retains_full_detail:
              type: boolean
            detail_compacted_field:
              type: string
            aggregate_only_field:
              type: string
        summary:
          type: object
          required: [source_report_count, current_full_fidelity_count, future_tiered_retention_candidate_count, detail_compacted_count, aggregate_only_count]
          properties:
            source_report_count:
              type: integer
            current_full_fidelity_count:
              type: integer
            future_tiered_retention_candidate_count:
              type: integer
            detail_compacted_count:
              type: integer
            aggregate_only_count:
              type: integer
        sources:
          type: array
          items:
            $ref: '#/components/schemas/ScopeReportRetentionSource'
    ScopeReportRetentionSource:
      type: object
      required: [source_report_id, target_id, target_name, task_id, task_name, result_count, vulnerability_count, max_severity, retention_state, detail_compacted, aggregate_only, kept_as_latest, pinned_by_scope_report, future_tiered_retention_candidate]
      properties:
        source_report_id:
          type: string
          format: uuid
        target_id:
          type: string
          format: uuid
        target_name:
          type: string
        task_id:
          type: string
          format: uuid
        task_name:
          type: string
        scan_start:
          type: string
          format: date-time
        scan_end:
          type: string
          format: date-time
        selected_time:
          type: string
          format: date-time
        result_count:
          type: integer
        vulnerability_count:
          type: integer
        max_severity:
          type: number
        retention_state:
          enum: [current_full_fidelity, future_tiered_retention_candidate]
        detail_compacted:
          type: boolean
        aggregate_only:
          type: boolean
        kept_as_latest:
          type: boolean
        pinned_by_scope_report:
          type: boolean
        future_tiered_retention_candidate:
          type: boolean
    TargetCredentialReference:
      type: object
      required: [id, name, credential_type]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Credential display name; secret material is never returned.
        credential_type:
          type: string
          description: Internal credential kind, such as up, usk, snmp, or krb5.
        port:
          type: integer
          nullable: true
          description: Credential-use port where relevant, currently mainly SSH.
    TargetCredentials:
      type: object
      properties:
