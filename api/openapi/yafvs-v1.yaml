    post:
      operationId: postTasksByTaskIdStop
      x-yafvs-direct: true
      x-yafvs-exposure: direct-write
      x-yafvs-profile: shared-write
      x-yafvs-inherited-still-owns: task-resume-and-other-scanner-control
      x-yafvs-maturity: live-control
      x-yafvs-replaces: task-stop
      x-yafvs-operator-identity: direct-token-operator
      x-yafvs-team-authority: authenticated-stack-operator
      x-yafvs-owner-semantics: gvmd-acl-user-and-task-permission
      x-yafvs-safety-contract: write-control-v1
      x-yafvs-side-effect: scanner-control
      summary: Stop an existing scan task through bounded gvmd control
      description: Guarded direct write-control endpoint that sends exactly one shared-secret-authenticated stop command containing the authenticated operator UUID and task UUID to YAFVS_API_GVMD_CONTROL_SOCKET, defaulting to /runtime/run/gvmd/yafvs-control.sock. gvmd enforces acl_user_may and task permission, serializes OSP start/stop and finalization for the task, rejects stale handlers by report state, and changes queue/task/report state only after scanner absence is verified; the Rust API does not apply a task-owner equality check. Scanner-verification failures return 502, an inherited asynchronous-only stop returns 409 without claiming success, and malformed or unavailable control exchanges remain distinct. The exchange has bounded connect, write, and response-read timeouts and accepts only one exact LF-terminated response followed by EOF. The same route is exposed through the authenticated same-origin browser proxy. Resume and other scanner-control behavior remain inherited.
      parameters:
        - $ref: '#/components/parameters/TaskId'
