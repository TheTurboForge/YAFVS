      operationId: getCertBundAdvisoriesByCertBundAdvisoryId
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: cert-bund-advisory-catalog-detail-read
      summary: Read one Security Information CERT-Bund advisory catalog entry
      description: Catalog-detail metadata backed by CERT feed metadata imported into gvmd/PostgreSQL plus read-only rich advisory fields parsed from the mounted CERT feed copy.
      parameters:
        - $ref: '#/components/parameters/CertBundAdvisoryId'
      responses:
        '200':
          description: CERT-Bund advisory catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertBundAdvisoryDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /cert-bund-advisories/{cert_bund_advisory_id}/export:
    get:
      operationId: getCertBundAdvisoriesByCertBundAdvisoryIdExport
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: cert-bund-advisory-metadata-export-read
      summary: Export one CERT-Bund advisory metadata record
      description: Direct scriptable CERT-Bund advisory metadata export backed by the same PostgreSQL and mounted CERT feed detail loader as the native detail endpoint.
      parameters:
        - $ref: '#/components/parameters/CertBundAdvisoryId'
      responses:
        '200':
          description: CERT-Bund advisory metadata export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertBundAdvisoryDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /dfn-cert-advisories:
    get:
      operationId: getDfnCertAdvisories
      x-yafvs-direct: true
      x-yafvs-exposure: direct-read
      x-yafvs-profile: shared-read
      x-yafvs-maturity: live-read
      x-yafvs-replaces: dfn-cert-advisory-list-read
      summary: List Security Information DFN-CERT advisories
      description: Searchable DFN-CERT advisory list backed by CERT feed metadata already imported into gvmd/PostgreSQL.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: DFN-CERT advisory collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DfnCertAdvisoryCollection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
  /dfn-cert-advisories/{dfn_cert_advisory_id}:
