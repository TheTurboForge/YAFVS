          type: string
          pattern: '^[0-9]+(?:\.[0-9]+)+$'
        status:
          type: string
          enum: [selected]
    ScheduleCloneRequest:
      type: object
      additionalProperties: false
      description: Optional metadata overrides for a cloned schedule. Empty object uses the inherited-style unique Clone name and copies the source comment and calendar fields.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
    ScheduleAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleAsset'
    ReportFormatAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportFormatAsset'
    TrashcanSummary:
      type: object
      required: [items, total]
