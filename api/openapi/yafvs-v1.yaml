components:
  securitySchemes:
    operatorSession:
      type: apiKey
      in: cookie
      name: yafvs_session
      description: Authenticated same-origin operator session used by the GSA/gsad browser proxy.
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token for the opt-in direct native API development listener.
  responses:
    BadRequest:
      description: Request parameters, path values, or request shape are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication is missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: The authenticated operator is not allowed to perform this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested native API resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: The native API request conflicts with existing persistent state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: The request shape is valid, but authoritative resource validation rejected its values.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowed:
      description: The endpoint supports only the documented HTTP method.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RequestTooLarge:
      description: The direct native API request or generated export exceeded the endpoint's accepted size limits.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: The direct native API listener is handling too many concurrent requests.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: The native API could not complete the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGateway:
      description: The private gvmd control transport failed, returned an invalid response, or left a mutation outcome indeterminate. Inspect the Error code before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: The private gvmd control service is temporarily unavailable, or the service-wide database compatibility gate has blocked all native mutations for an unrecognized gvmd/pg-gvm schema. Inspect the Error code; database_write_incompatible is not retryable until the deployed schema and API compatibility contract are aligned.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    GatewayTimeout:
      description: The native request exceeded its bounded whole-request processing deadline. Inspect current state before retrying a mutation because cancellation may race a database or private-control commit acknowledgement.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    Sort:
      name: sort
      in: query
      schema:
        type: string
    Filter:
      name: filter
      in: query
      schema:
        type: string
        maxLength: 4096
    TrashcanItemId:
      name: id
      in: query
      required: false
      description: Return only the Trashcan item with this exact UUID.
      schema:
        type: string
        format: uuid
    ReportTaskId:
      name: task_id
      in: query
      required: false
      description: Return only raw reports owned by the specified scan task.
      schema:
        type: string
        format: uuid
    CollectionTaskId:
      name: task_id
      in: query
      required: false
      description: Return only collection rows associated with the specified scan task.
      schema:
        type: string
        format: uuid
    NvtOidFilter:
      name: nvt_oid
      in: query
      required: false
      description: Return only result rows emitted by the specified vulnerability test OID.
      schema:
        type: string
        minLength: 1
        maxLength: 4096
    VulnerabilityIdFilter:
      name: vulnerability_id
      in: query
      required: false
      description: Return only the vulnerability row with the specified aggregate identifier, normally an NVT OID.
      schema:
        type: string
        minLength: 1
        maxLength: 4096
    ExactNameFilter:
      name: name
      in: query
      required: false
      description: Return only collection rows whose canonical name exactly matches this value.
      schema:
        type: string
        minLength: 1
        maxLength: 4096
    PredefinedFilter:
      name: predefined
      in: query
      required: false
      description: Return only predefined or only non-predefined collection rows.
      schema:
        type: integer
        enum: [0, 1]
    FilterType:
      name: filter_type
      in: query
      description: Exact saved-filter resource type, for example result, report, target, or task.
      schema:
        type: string
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Optional client correlation ID for the direct bearer listener. Invalid, empty, or oversized values are replaced by a generated ID.
      schema:
        type: string
        maxLength: 128
        pattern: '^[A-Za-z0-9_.:-]+$'
    ReportId:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SettingId:
      name: setting_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CanonicalPdfReportFormatId:
      name: report_format_id
      in: query
      required: false
      description: Optional canonical PDF report-format UUID. Omitting it selects the same native evidence PDF. Any other value is rejected; custom filters and scripts are not supported by this contract.
      schema:
        type: string
        format: uuid
        default: c402cc3e-b531-11e1-9163-406186ea4fc5
        enum: [c402cc3e-b531-11e1-9163-406186ea4fc5]
    ResultId:
