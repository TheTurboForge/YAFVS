      type: object
      required: [resource_type, title, count]
      properties:
        resource_type:
          type: string
          enum: [alerts, scan_configs, credentials, filters, overrides, port_listss, report_formats, scanners, schedules, tags, targets, tasks]
        title:
          type: string
        count:
          type: integer
          minimum: 0
    TrashEmptyPreview:
      type: object
      required: [scope, items, total, snapshot_digest]
      properties:
        scope:
          type: string
          enum: [operator]
        items:
          type: array
          minItems: 12
          maxItems: 12
          items:
            $ref: '#/components/schemas/TrashEmptyPreviewItem'
        total:
          type: integer
          minimum: 0
        snapshot_digest:
          type: string
          pattern: '^[0-9a-f]{64}$'
    TrashEmptyPreviewItem:
      type: object
      required: [resource_type, count]
      properties:
        resource_type:
          type: string
          enum: [configs, alerts, credentials, filters, overrides, port_listss, scanners, schedules, tags, targets, tasks, report_formats]
        count:
          type: integer
          minimum: 0
    TrashEmptyRequest:
      type: object
      additionalProperties: false
      required: [acknowledge_permanent_deletion, expected_total, expected_snapshot_digest]
      properties:
        acknowledge_permanent_deletion:
          type: boolean
          const: true
        expected_total:
          type: integer
          minimum: 0
