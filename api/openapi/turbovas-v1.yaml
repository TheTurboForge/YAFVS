openapi: 3.1.0
info:
  title: TurboVAS Native API
  version: 0.1.0-contract
  description: Read-only contract baseline for DB-backed TurboVAS product workflows.
servers:
  - url: /api/v1
security:
  - operatorSession: []
paths:
  /results:
    get:
      summary: List top-level scan results
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Result collection across raw scan reports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultCollection'
  /vulnerabilities:
    get:
      summary: List top-level vulnerabilities from scan results
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Vulnerability collection aggregated from positive-severity raw scan results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnerabilityCollection'
  /cves:
    get:
      summary: List Security Information CVEs
      description: Searchable CVE intelligence catalog backed by SCAP feed metadata in gvmd/PostgreSQL. This is distinct from observed report CVEs and vulnerability findings.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: CVE catalog collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCveCollection'
  /cves/{cve_id}:
    get:
      summary: Read one Security Information CVE
      parameters:
        - $ref: '#/components/parameters/CveId'
      responses:
        '200':
          description: CVE catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCve'
  /cpes:
    get:
      summary: List Security Information CPEs
      description: Searchable CPE intelligence catalog backed by SCAP feed metadata in gvmd/PostgreSQL. This is distinct from observed operating-system and application evidence in raw and scope reports.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: CPE catalog collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCpeCollection'
  /cpes/{cpe_id}:
    get:
      summary: Read one Security Information CPE
      parameters:
        - $ref: '#/components/parameters/CpeId'
      responses:
        '200':
          description: CPE catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCpe'
  /cert-bund-advisories:
    get:
      summary: List Security Information CERT-Bund advisories
      description: Searchable CERT-Bund advisory list backed by CERT feed metadata already imported into gvmd/PostgreSQL. Rich advisory detail remains inherited from feed XML/XSLT.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: CERT-Bund advisory collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertBundAdvisoryCollection'
  /cert-bund-advisories/{cert_bund_advisory_id}:
    get:
      summary: Read one Security Information CERT-Bund advisory catalog entry
      description: Catalog-detail metadata backed by CERT feed metadata already imported into gvmd/PostgreSQL. This endpoint intentionally does not reconstruct XML-only rich advisory fields such as revision history, platform, risk, reference URLs, or description blocks.
      parameters:
        - $ref: '#/components/parameters/CertBundAdvisoryId'
      responses:
        '200':
          description: CERT-Bund advisory catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertBundAdvisory'
  /dfn-cert-advisories:
    get:
      summary: List Security Information DFN-CERT advisories
      description: Searchable DFN-CERT advisory list backed by CERT feed metadata already imported into gvmd/PostgreSQL. Rich advisory detail remains inherited from feed XML/XSLT.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: DFN-CERT advisory collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DfnCertAdvisoryCollection'
  /dfn-cert-advisories/{dfn_cert_advisory_id}:
    get:
      summary: Read one Security Information DFN-CERT advisory catalog entry
      description: Catalog-detail metadata backed by CERT feed metadata already imported into gvmd/PostgreSQL. This endpoint intentionally does not reconstruct XML-only rich advisory fields such as advisory links or additional feed links.
      parameters:
        - $ref: '#/components/parameters/DfnCertAdvisoryId'
      responses:
        '200':
          description: DFN-CERT advisory catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DfnCertAdvisory'
  /nvts:
    get:
      summary: List Security Information NVTs
      description: Searchable NVT catalog backed by gvmd/PostgreSQL feed metadata. This list contract is intentionally separate from rich NVT detail, preferences, and export behavior, which remain inherited until a separate typed contract is designed.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: NVT catalog collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NvtCatalogCollection'
  /nvts/{nvt_id}:
    get:
      summary: Read one Security Information NVT catalog entry
      description: Catalog-detail metadata backed by NVT feed metadata already imported into gvmd/PostgreSQL. This endpoint uses NVT numeric dotted OIDs and intentionally excludes preferences, selector/config expansion, export, feed-control, scanner-control, and write semantics.
      parameters:
        - $ref: '#/components/parameters/NvtId'
      responses:
        '200':
          description: NVT catalog detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NvtCatalogDetail'
  /operating-systems:
    get:
      summary: List top-level operating-system assets
      description: Inherited asset view backed by gvmd/PostgreSQL operating-system evidence, distinct from report operating-system evidence tabs.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Operating-system asset collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatingSystemAssetCollection'
  /hosts:
    get:
      summary: List top-level host assets
      description: Inherited host asset view backed by gvmd/PostgreSQL host identifiers, details, and severity state.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Host asset collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostAssetCollection'
  /tls-certificates:
    get:
      summary: List top-level TLS certificate assets
      description: Inherited TLS certificate asset view backed by gvmd/PostgreSQL certificate, source, and location tables.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: TLS certificate asset collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TlsCertificateAssetCollection'
  /scanners:
    get:
      summary: List scanner metadata
      description: Read-only scanner list metadata backed by gvmd/PostgreSQL. Credential secrets, scanner CA material, and control operations are intentionally excluded.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scanner metadata collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScannerAssetCollection'
  /filters:
    get:
      summary: List saved filters
      description: Read-only saved-filter metadata backed by gvmd/PostgreSQL. Filter terms are operator configuration data and remain available only through authenticated operator access.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Saved filter collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterAssetCollection'
  /filters/{filter_id}:
    get:
      summary: Read one saved filter
      parameters:
        - $ref: '#/components/parameters/FilterId'
      responses:
        '200':
          description: Saved filter detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterAsset'
  /tags:
    get:
      summary: List tags
      description: Read-only tag metadata backed by gvmd/PostgreSQL. Tag create, modify, clone, enable/disable, export, delete, and assigned-resource expansion remain on inherited compatibility paths while native write/resource semantics are designed.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Tag collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagAssetCollection'
  /tags/{tag_id}:
    get:
      summary: Read one tag
      parameters:
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Tag detail metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagAsset'
  /overrides:
    get:
      summary: List overrides
      description: Read-only override metadata backed by gvmd/PostgreSQL. Create, modify, clone, export, delete, trashcan mutation, and result-specific override expansion remain on inherited compatibility paths while native write semantics are designed.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Override collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverrideAssetCollection'
  /overrides/{override_id}:
    get:
      summary: Read one override
      parameters:
        - $ref: '#/components/parameters/OverrideId'
      responses:
        '200':
          description: Override detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverrideAsset'
  /port-lists:
    get:
      summary: List port lists
      description: Read-only port-list metadata backed by gvmd/PostgreSQL. Create, modify, import, export, and delete operations remain on inherited compatibility paths while native write semantics are designed.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Port-list collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortListAssetCollection'
  /port-lists/{port_list_id}:
    get:
      summary: Read one port list
      parameters:
        - $ref: '#/components/parameters/PortListId'
      responses:
        '200':
          description: Port-list detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortListAsset'
  /schedules:
    get:
      summary: List schedules
      description: Read-only schedule metadata backed by gvmd/PostgreSQL. Create, modify, clone, export, and delete operations remain on inherited compatibility paths while native write semantics are designed.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Schedule collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleAssetCollection'
  /schedules/{schedule_id}:
    get:
      summary: Read one schedule
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      responses:
        '200':
          description: Schedule detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleAsset'
  /scan-configs:
    get:
      summary: List scan configs
      description: Read-only scan-config metadata backed by gvmd/PostgreSQL. Preference values, NVT selector expansion, family edit payloads, import/export, scanner control, and create/modify/delete operations remain on inherited compatibility paths while native write/resource semantics are designed.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
        - name: predefined
          in: query
          required: false
          schema:
            type: string
            enum: ['0', '1']
          description: Optional predefined filter; use 1 for predefined configs and 0 for user-created configs.
      responses:
        '200':
          description: Scan-config metadata collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanConfigAssetCollection'
  /scan-configs/{scan_config_id}:
    get:
      summary: Read one scan config metadata record
      description: Metadata-only detail for automation and proof probes. Rich GSA detail tabs still use inherited GMP because they require families, preferences, and selector expansion.
      parameters:
        - $ref: '#/components/parameters/ScanConfigId'
      responses:
        '200':
          description: Scan-config metadata detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanConfigAsset'
  /report-configs:
    get:
      summary: List report configs
      description: Read-only report-config metadata backed by gvmd/PostgreSQL. Create, modify, clone, export, and delete operations remain on inherited compatibility paths while native write semantics are designed.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Report-config collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportConfigAssetCollection'
  /report-configs/{report_config_id}:
    get:
      summary: Read one report config
      parameters:
        - $ref: '#/components/parameters/ReportConfigId'
      responses:
        '200':
          description: Report-config detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportConfigAsset'
  /report-formats:
    get:
      summary: List report formats
      description: Read-only report-format metadata backed by gvmd/PostgreSQL. Create, modify, import, export, verify, and delete operations remain on inherited compatibility paths while native write semantics are designed.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Report-format collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportFormatAssetCollection'
  /report-formats/{report_format_id}:
    get:
      summary: Read one report format
      parameters:
        - $ref: '#/components/parameters/ReportFormatId'
      responses:
        '200':
          description: Report-format detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportFormatAsset'
  /reports:
    get:
      summary: List raw scan reports
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportCollection'
  /reports/{report_id}:
    get:
      summary: Read one raw scan report summary
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Raw report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
  /reports/{report_id}/results:
    get:
      summary: List raw scan report results
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report result collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultCollection'
  /reports/{report_id}/hosts:
    get:
      summary: List raw scan report hosts
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report host collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportHostCollection'
  /reports/{report_id}/ports:
    get:
      summary: List raw scan report ports
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report port collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortCollection'
  /reports/{report_id}/applications:
    get:
      summary: List raw scan report applications
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report application collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationCollection'
  /reports/{report_id}/operating-systems:
    get:
      summary: List raw scan report operating systems
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report operating system collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatingSystemCollection'
  /reports/{report_id}/cves:
    get:
      summary: List raw scan report CVEs
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report CVE collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CveCollection'
  /reports/{report_id}/tls-certificates:
    get:
      summary: List raw scan report TLS certificates
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report TLS certificate collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TlsCertificateCollection'
  /reports/{report_id}/errors:
    get:
      summary: List raw scan report Error Messages
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report Error Message collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageCollection'
  /reports/{report_id}/metrics:
    get:
      summary: Read raw report metrics
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: CVSS Load and authenticated coverage metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportMetrics'
  /scopes:
    get:
      summary: List scopes
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopeCollection'
  /scopes/{scope_id}:
    get:
      summary: Read one scope
      parameters:
        - $ref: '#/components/parameters/ScopeId'
      responses:
        '200':
          description: Scope detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scope'
  /targets:
    get:
      summary: List scan targets
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Target collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetCollection'
  /targets/{target_id}:
    get:
      summary: Read one scan target summary
      parameters:
        - $ref: '#/components/parameters/TargetId'
      responses:
        '200':
          description: Target detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Target'
  /tasks:
    get:
      summary: List scan tasks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Task collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCollection'
  /tasks/{task_id}:
    get:
      summary: Read one scan task summary
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /scope-reports:
    get:
      summary: List generated scope reports
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopeReportCollection'
  /scopes/{scope_id}/reports/{scope_report_id}:
    get:
      summary: Read one scope report
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
      responses:
        '200':
          description: Scope report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopeReport'
  /scopes/{scope_id}/reports/{scope_report_id}/results:
    get:
      summary: List deduplicated scope report results
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report result collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultCollection'
  /scopes/{scope_id}/reports/{scope_report_id}/hosts:
    get:
      summary: List scope report hosts
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
