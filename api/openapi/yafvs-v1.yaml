    CredentialUsageReference:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        use_type:
          type: string
          description: Non-secret relationship kind, such as target login-data type or scanner.
        port:
          type: [integer, 'null']
          description: Non-secret credential-use port where the relationship records one.
    CredentialAsset:
      type: object
      required: [id, name, owner_id, owner, credential_type, smb_compatible, allow_insecure, target_count, scanner_count, targets, scanners]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        comment:
          type: string
        owner_id:
          type: [string, 'null']
          format: uuid
          description: Owner identity used for exact operator-ownership preflight.
        owner:
          type: string
        credential_type:
          type: string
          description: Internal credential kind only; secret material is never returned by this native endpoint.
        smb_compatible:
          type: boolean
          description: True only when this is a username/password credential whose stored login is non-empty and valid for inherited SMB delivery. The login and all other secret material remain write-only.
        allow_insecure:
          type: boolean
        target_count:
          type: integer
        scanner_count:
          type: integer
        targets:
          type: array
          description: Target backlinks by id/name/use type only. Target host data and credential secret data are not returned here.
          items:
            $ref: '#/components/schemas/CredentialUsageReference'
        scanners:
          type: array
          description: Scanner backlinks by id/name only. Scanner CA material and credential secret data are not returned here.
          items:
            $ref: '#/components/schemas/CredentialUsageReference'
        created_at:
          type: string
          format: date-time
        modified_at:
          type: string
          format: date-time
    UserAccountCollection:
