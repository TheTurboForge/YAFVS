name: "Setup Rust Environment"
description: "Install necessary dependencies and set up Rust stable"
inputs:
  arch:
    description: "amd64 or arm64"
    required: true
    type: string
runs:
  using: "composite"
  steps:
    - name: validate architecture input
      shell: bash
      env:
        TURBOVAS_RUST_BIN_ARCH: ${{ inputs.arch }}
      run: |
        case "$TURBOVAS_RUST_BIN_ARCH" in
          amd64|arm64) ;;
          *)
            echo "Unsupported architecture: $TURBOVAS_RUST_BIN_ARCH" >&2
            exit 1
            ;;
        esac
    - name: download rs binaries
      uses: actions/download-artifact@v5
      with:
        pattern: rs-binaries-${{ inputs.arch }}
        merge-multiple: true
        path: ./assets
    - run: mkdir -p .docker/install/usr/local
      shell: bash
    - run: |
        case "$TURBOVAS_RUST_BIN_ARCH" in
          amd64|arm64) ;;
          *)
            echo "Unsupported architecture: $TURBOVAS_RUST_BIN_ARCH" >&2
            exit 1
            ;;
        esac
        mv "assets/linux/$TURBOVAS_RUST_BIN_ARCH" .docker/install/usr/local/bin
      shell: bash
      env:
        TURBOVAS_RUST_BIN_ARCH: ${{ inputs.arch }}
    - run: ls -las .docker/install/usr/local/bin
      shell: bash
