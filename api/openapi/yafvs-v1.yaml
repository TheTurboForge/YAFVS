        format: uuid
    ScheduleId:
      name: schedule_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScanConfigId:
      name: scan_config_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScanConfigFamilyName:
      name: family
      in: path
      required: true
      description: Exact NVT family name. Reserved path characters must be URL-encoded.
      schema:
        type: string
        minLength: 1
        maxLength: 256
    ReportFormatId:
      name: report_format_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertBundAdvisoryId:
      name: cert_bund_advisory_id
      in: path
      required: true
      description: CERT-Bund advisory identifier as stored in gvmd/PostgreSQL. Slash characters must be URL-encoded when used as a path segment.
      schema:
        type: string
        maxLength: 256
        pattern: '^[A-Za-z0-9._:/-]+$'
    DfnCertAdvisoryId:
      name: dfn_cert_advisory_id
      in: path
      required: true
      description: DFN-CERT advisory identifier as stored in gvmd/PostgreSQL.
      schema:
        type: string
        maxLength: 256
        pattern: '^[A-Za-z0-9._:/-]+$'
  headers:
    RequestId:
      description: Request correlation ID returned by the direct bearer listener.
      schema:
        type: string
        maxLength: 128
        pattern: '^[A-Za-z0-9_.:-]+$'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    PageInfo:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        sort:
          type: string
        filter:
          type: string
    ReportCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Report'
    ScopeCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Scope'
    ScopeCreateRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
          x-yafvs-max-bytes: 4096
        comment:
          type: string
          maxLength: 4096
        protection_requirement:
          enum: [normal, high, very_high]
        target_ids:
          type: array
          items:
            type: string
            format: uuid
          uniqueItems: true
        host_ids:
          type: array
          items:
            type: string
            format: uuid
          uniqueItems: true
    ScheduleCreateRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - icalendar
      description: Create a schedule using gvmd's authoritative timezone and iCalendar semantics. Blank timezone uses the operator's configured timezone and then UTC fallback.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        timezone:
          type: string
          maxLength: 256
        icalendar:
          type: string
          minLength: 1
          maxLength: 32768
    ScopePatchRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        protection_requirement:
          enum: [normal, high, very_high]
        target_ids:
          type: array
          items:
            type: string
            format: uuid
          uniqueItems: true
        host_ids:
          type: array
          items:
            type: string
            format: uuid
          uniqueItems: true
    ScopeReportCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScopeReport'
    TargetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Target'
    TargetCreateRequest:
      oneOf:
        - $ref: '#/components/schemas/TargetCreateExplicitHostsRequest'
        - $ref: '#/components/schemas/TargetCreateHostAssetsRequest'
    TargetCreateExplicitHostsRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - alive_tests
        - allow_simultaneous_ips
        - reverse_lookup_only
        - reverse_lookup_unify
        - port_list_id
        - hosts
      properties:
        name:
          type: string
          maxLength: 4096
          description: Target name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: Optional target comment. Blank comments are stored as empty after trimming.
        alive_tests:
          type: array
          minItems: 1
          description: Alive-test labels to store as the inherited target alive-test bitfield. Use exactly Scan Config Default, exactly Consider Alive, or one or more probe labels.
          items:
            type: string
            enum:
              - Scan Config Default
              - Consider Alive
              - TCP-ACK Service Ping
              - ICMP Ping
              - ARP Ping
              - TCP-SYN Service Ping
        allow_simultaneous_ips:
          type: boolean
          description: Whether multiple IPs for the same DNS name may be scanned.
        reverse_lookup_only:
          type: boolean
          description: Whether to scan only hosts with reverse DNS names.
        reverse_lookup_unify:
          type: boolean
          description: Whether to scan only one IP when multiple IPs resolve to the same name.
        port_list_id:
          type: string
          format: uuid
          description: Existing port list to assign to the target. The reference must be predefined or human-owned.
        hosts:
          type: array
          minItems: 1
          maxItems: 4095
          description: Explicit host, CIDR, or range expressions to assign to the target. Mutually exclusive with host_asset_ids.
          items:
            type: string
            maxLength: 4096
        host_asset_ids: false
        exclude_hosts:
          type: array
          description: Simple explicit host entries to exclude from hosts in the same request. Cannot fully exclude the target.
          items:
            type: string
            maxLength: 4096
        credentials:
          $ref: '#/components/schemas/TargetCredentialsCreateRequest'
    TargetCreateHostAssetsRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - alive_tests
        - allow_simultaneous_ips
        - reverse_lookup_only
        - reverse_lookup_unify
        - port_list_id
        - host_asset_ids
      properties:
        name:
          type: string
          maxLength: 4096
          description: Target name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: Optional target comment. Blank comments are stored as empty after trimming.
        alive_tests:
          type: array
          minItems: 1
          description: Alive-test labels to store as the inherited target alive-test bitfield. Use exactly Scan Config Default, exactly Consider Alive, or one or more probe labels.
          items:
            type: string
            enum:
              - Scan Config Default
              - Consider Alive
              - TCP-ACK Service Ping
              - ICMP Ping
              - ARP Ping
              - TCP-SYN Service Ping
        allow_simultaneous_ips:
          type: boolean
          description: Whether multiple IPs for the same DNS name may be scanned.
        reverse_lookup_only:
          type: boolean
          description: Whether to scan only hosts with reverse DNS names.
        reverse_lookup_unify:
          type: boolean
          description: Whether to scan only one IP when multiple IPs resolve to the same name.
        port_list_id:
          type: string
          format: uuid
          description: Existing port list to assign to the target. The reference must be predefined or human-owned.
        hosts: false
        host_asset_ids:
          type: array
          minItems: 1
          maxItems: 4095
          uniqueItems: true
          description: Ordered native host-asset UUIDs whose canonical asset names are resolved transactionally when the target is created. Mutually exclusive with hosts.
          items:
            type: string
            format: uuid
        exclude_hosts:
          type: array
          description: Simple explicit host entries to exclude from hosts in the same request. Cannot fully exclude the target.
          items:
            type: string
            maxLength: 4096
        credentials:
          $ref: '#/components/schemas/TargetCredentialsCreateRequest'
    TargetPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          maxLength: 4096
          description: New target name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: New target comment. Blank comments clear the comment after trimming.
        alive_tests:
          type: array
          description: Alive-test labels to store as the inherited target alive-test bitfield. Use exactly Scan Config Default, exactly Consider Alive, or one or more probe labels.
          items:
            type: string
            enum:
              - Scan Config Default
              - Consider Alive
              - TCP-ACK Service Ping
              - ICMP Ping
              - ARP Ping
              - TCP-SYN Service Ping
        allow_simultaneous_ips:
          type: boolean
          description: Whether multiple IPs for the same DNS name may be scanned. Rejected while the target is referenced by a live task.
        reverse_lookup_only:
          type: boolean
          description: Whether to scan only hosts with reverse DNS names. Rejected while the target is referenced by a live task.
        reverse_lookup_unify:
          type: boolean
          description: Whether to scan only one IP when multiple IPs resolve to the same name. Rejected while the target is referenced by a live task.
        port_list_id:
          type: string
          format: uuid
          description: Port list to assign to the target. The reference must be predefined or human-owned, and assignment is rejected while the target is referenced by a live task.
        hosts:
          type: array
          maxItems: 4095
          description: Simple explicit host entries to assign to the target. CIDR/range grammar remains inherited until separately implemented. Rejected while the target is referenced by a live task.
          items:
            type: string
            maxLength: 4096
        exclude_hosts:
          type: array
          description: Simple explicit host entries to exclude from hosts in the same request. Cannot fully exclude the target. Rejected while the target is referenced by a live task.
          items:
            type: string
            maxLength: 4096
        credentials:
          $ref: '#/components/schemas/TargetCredentialsPatchRequest'
    TargetCredentialLinkPatchRequest:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          type: string
          format: uuid
          description: Existing credential to assign. The credential must be human-owned and have a type allowed for the selected target credential use.
    TargetSshCredentialLinkPatchRequest:
      type: object
      additionalProperties: false
      required: [id, host_key_pins]
      properties:
        id:
          type: string
          format: uuid
          description: Existing SSH credential to assign. The credential must be human-owned and have type up or usk.
        port:
          type: integer
          minimum: 1
          maximum: 65535
          description: SSH authentication port; omitted ports default to 22.
        host_key_pins:
          type: array
          minItems: 1
          maxItems: 4095
          description: Explicit per-IP SSH server host-key pins. Credentialed SSH scans fail closed when the current target IP has no matching SHA-256 pin.
          items:
            $ref: '#/components/schemas/SshHostKeyPin'
    SshHostKeyPin:
      type: object
      additionalProperties: false
      required: [host, fingerprint]
      properties:
        host:
          type: string
          description: Canonical IPv4 or IPv6 address of one target endpoint.
        fingerprint:
          type: string
          pattern: '^SHA256:[A-Za-z0-9+/]{43}$'
          description: Standard unpadded OpenSSH SHA-256 host-key fingerprint.
    TargetCredentialsCreateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      description: Target credential references to assign during target creation. Each present field sets that credential use to an existing credential reference. Null clear actions and secret material are never accepted.
      properties:
        ssh:
          $ref: '#/components/schemas/TargetSshCredentialLinkPatchRequest'
        ssh_elevate:
          $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
        smb:
          $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
        esxi:
          $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
        snmp:
          $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
        krb5:
          $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
    TargetCredentialsPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      description: Target credential reference patch. Each present field sets that credential use to an existing credential reference; null clears that credential use. Secret material is never accepted or returned. Credential-link changes are rejected while the target is referenced by a live task.
      properties:
        ssh:
          anyOf:
            - $ref: '#/components/schemas/TargetSshCredentialLinkPatchRequest'
            - type: 'null'
        ssh_elevate:
          anyOf:
            - $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
            - type: 'null'
        smb:
          anyOf:
            - $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
            - type: 'null'
        esxi:
          anyOf:
            - $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
            - type: 'null'
        snmp:
          anyOf:
            - $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
            - type: 'null'
        krb5:
          anyOf:
            - $ref: '#/components/schemas/TargetCredentialLinkPatchRequest'
            - type: 'null'
    TargetCloneRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 4096
          description: Optional clone name. Blank names are rejected after trimming; if omitted, the database generates an inherited-style unique clone name.
        comment:
          type: string
          maxLength: 4096
          description: Optional clone comment. If omitted, the source target comment is copied.
    TaskCreateRequest:
      type: object
      additionalProperties: false
      required: [name, target_id, config_id, scanner_id]
      properties:
        name:
          type: string
          maxLength: 4096
          description: Task name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: Optional task comment. Blank comments are stored as empty comments after trimming.
        target_id:
          type: string
          format: uuid
          description: Human-owned target to scan.
        config_id:
          type: string
          format: uuid
          description: Human-owned or predefined scan config.
        scanner_id:
          type: string
          format: uuid
          description: Human-owned or built-in scanner capable of running scan tasks.
        schedule_id:
          type: string
          format: uuid
          description: Optional human-owned schedule. Its next run time is computed when the task is created.
        alert_ids:
          type: array
          maxItems: 5
          uniqueItems: true
          default: []
          description: Optional distinct human-owned alerts.
          items:
            type: string
            format: uuid
        hosts_ordering:
          type: string
          enum: [random, sequential, reverse]
          default: random
          description: Optional scanner host ordering persisted as a task preference and forwarded to OSP/OpenVASD.
        schedule_periods:
          type: integer
          minimum: 0
          default: 0
          description: Number of schedule periods; zero preserves inherited unlimited-period behavior.
        apply_overrides:
          type: boolean
          default: true
          description: Apply overrides while processing scan results into asset state.
        max_checks:
          type: integer
          minimum: 0
          default: 4
          description: Maximum concurrently executed NVTs per host.
        max_hosts:
          type: integer
          minimum: 0
          default: 20
          description: Maximum concurrently scanned hosts.
        min_qod:
          type: integer
          minimum: 0
          maximum: 100
          default: 70
          description: Minimum QoD used while processing scan results into asset state.
        tag_id:
          type: string
          format: uuid
          description: Optional human-owned task tag attached atomically at creation.
    TaskPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          maxLength: 4096
          description: New task name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: New task comment. Blank comments clear the comment after trimming.
    TaskReplaceRequest:
      type: object
      additionalProperties: false
      required: [name, target_id, config_id, scanner_id, alert_ids, hosts_ordering, schedule_periods, apply_overrides, max_checks, max_hosts, min_qod]
      properties:
        name:
          type: string
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        target_id:
          type: string
          format: uuid
        config_id:
          type: string
          format: uuid
        scanner_id:
          type: string
          format: uuid
        schedule_id:
          type: [string, 'null']
          format: uuid
          description: Operator-owned schedule, or null to remove the schedule.
        alert_ids:
          type: array
          maxItems: 5
          uniqueItems: true
          items:
            type: string
            format: uuid
        hosts_ordering:
          type: string
          enum: [random, sequential, reverse]
        schedule_periods:
          type: integer
          minimum: 0
        apply_overrides:
          type: boolean
        max_checks:
          type: integer
          minimum: 0
        max_hosts:
          type: integer
          minimum: 0
        min_qod:
          type: integer
          minimum: 0
          maximum: 100
    TaskTargetReplaceRequest:
      type: object
      additionalProperties: false
