name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-quality-gate:
    name: Source quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      NODE_OPTIONS: --max-old-space-size=6144

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: components/gsa/package-lock.json

      - name: Install source quality-gate tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bear \
            clang \
            cmake \
            fd-find \
            g++ \
            gcc \
            jq \
            just \
            ninja-build \
            pkg-config \
            ripgrep
          if ! command -v fd >/dev/null 2>&1; then
            sudo ln -s "$(command -v fdfind)" /usr/local/bin/fd
          fi
          python -m pip install --user uv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install GSA dependencies
        run: npm ci
        working-directory: components/gsa

      - name: Run YAFVS source quality gate
        run: |
          TURBOVAS_RUNTIME_DIR="$RUNNER_TEMP/turbovas-runtime" \
            tools/yafvsctl quality-gate --json

      - name: Upload quality-gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: yafvs-quality-gate
          path: ${{ runner.temp }}/turbovas-runtime/artifacts/quality-gate/*.json
          if-no-files-found: warn
