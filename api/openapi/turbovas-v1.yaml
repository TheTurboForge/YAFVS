components:
  securitySchemes:
    operatorSession:
      type: apiKey
      in: cookie
      name: turbovas_session
      description: Placeholder for the authenticated same-origin operator session.
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    Sort:
      name: sort
      in: query
      schema:
        type: string
    Filter:
      name: filter
      in: query
      schema:
        type: string
    ReportId:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CveId:
      name: cve_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^CVE-[0-9]{4}-[0-9]{4,}$'
    CpeId:
      name: cpe_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^cpe:.+'
    NvtId:
      name: nvt_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^([0-9]+\.)+[0-9]+$'
        maxLength: 128
    ScopeId:
      name: scope_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScopeReportId:
      name: scope_report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TargetId:
      name: target_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FilterId:
      name: filter_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TagId:
      name: tag_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OverrideId:
      name: override_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PortListId:
      name: port_list_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScheduleId:
      name: schedule_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScanConfigId:
      name: scan_config_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportFormatId:
      name: report_format_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportConfigId:
      name: report_config_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertBundAdvisoryId:
      name: cert_bund_advisory_id
      in: path
      required: true
      description: CERT-Bund advisory identifier as stored in gvmd/PostgreSQL. Slash characters must be URL-encoded when used as a path segment.
      schema:
        type: string
        maxLength: 256
        pattern: '^[A-Za-z0-9._:/-]+$'
    DfnCertAdvisoryId:
      name: dfn_cert_advisory_id
      in: path
      required: true
      description: DFN-CERT advisory identifier as stored in gvmd/PostgreSQL.
      schema:
        type: string
        maxLength: 256
        pattern: '^[A-Za-z0-9._:/-]+$'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    PageInfo:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        sort:
          type: string
        filter:
          type: string
    ReportCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Report'
    ScopeCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Scope'
    ScopeReportCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScopeReport'
    TargetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Target'
    TaskCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
    ResultCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Result'
    VulnerabilityCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Vulnerability'
    CatalogCveCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogCve'
    CatalogCpeCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogCpe'
    DfnCertAdvisoryCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/DfnCertAdvisory'
    CertBundAdvisoryCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CertBundAdvisory'
    NvtCatalogCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/NvtCatalogItem'
    ReportHostCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportHost'
    HostCollection:
      type: object
