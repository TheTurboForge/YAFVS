          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
    FilterCloneRequest:
      type: object
      additionalProperties: false
      description: Optional metadata overrides for a cloned saved filter. Empty object uses the inherited-style unique Clone name and copies the source comment, term, and type.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
    FilterCreateRequest:
      type: object
      required: [name]
      additionalProperties: false
      description: Metadata for a new saved filter. The direct endpoint creates only the filter row and does not create alert links or settings.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
    TagCloneRequest:
      type: object
      additionalProperties: false
      description: Optional metadata overrides for a cloned tag. Empty object uses the inherited-style unique Clone name and copies the source comment, value, resource type, active state, and resource assignments for native-safe resource types.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
    FilterPatchRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        filter_type:
          type: string
          maxLength: 4096
          description: Optional saved-filter resource type such as task, result, info, report, or target. Pretty names are normalized to database type names.
        term:
          type: string
          maxLength: 4096
          description: Optional saved-filter term stored as operator configuration data.
    CredentialPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          maxLength: 4096
          description: New credential name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: New credential comment. Blank comments clear the comment after trimming.
    CredentialCreateRequest:
      type: object
      additionalProperties: false
      required: [name, login, type]
      description: Write-only secret-bearing request for username/password (`up`) or username/SSH-key (`usk`) credential creation. `up` requires password and forbids passphrase/private_key; `usk` requires private_key, accepts an optional passphrase, and forbids password. With autogenerate true, only `up` and `usk` are accepted and password, passphrase, and private_key must all be omitted; the native service generates the write-only values before its bounded manager control dispatch. The combined decoded name, comment, login, secret, and private-key content must not exceed 48,800 bytes so every accepted request fits the bounded private control frame.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        login:
          type: string
          minLength: 1
          maxLength: 4096
        type:
          type: string
          enum: [up, usk]
        autogenerate:
          type: boolean
          default: false
          description: Generate native credential secrets for `up` or `usk`. When true, password, passphrase, and private_key are forbidden even when empty.
        password:
          type: string
          minLength: 1
          maxLength: 4096
          writeOnly: true
        passphrase:
          type: string
          maxLength: 4096
          writeOnly: true
        private_key:
          type: string
          minLength: 1
          maxLength: 32768
          writeOnly: true
    ScannerPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          maxLength: 4096
          description: New scanner name. Blank names are rejected after trimming.
        comment:
          type: string
          maxLength: 4096
          description: New scanner comment. Blank comments clear the comment after trimming.
    ScannerCloneRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
          description: Optional clone name; omitted names are generated from the source name.
        comment:
          type: string
          maxLength: 4096
          description: Optional clone comment; omitted comments are copied from the source.
    ScannerConfigurationRequest:
      type: object
      additionalProperties: false
      required: [name, comment, host, port, scanner_type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        host:
          type: string
          minLength: 1
          maxLength: 4096
          description: IPv4 address, IPv6 address, DNS name, or normalized absolute Unix socket path.
        port:
          type: integer
          minimum: 0
          maximum: 65535
          description: Port 1 through 65535 for network scanners, or 0 for Unix socket scanners.
        scanner_type:
          type: integer
          enum: [2, 5, 6, 8]
        ca_pub:
          type: [string, 'null']
          maxLength: 65536
          description: Optional bounded PEM CA certificate bundle containing one or more CERTIFICATE blocks. Stored as null for Unix socket scanners.
        credential_id:
          type: [string, 'null']
          format: uuid
          description: Optional operator-owned certificate credential of type cc. Stored as null for Unix socket scanners.
        relay_host:
          type: [string, 'null']
          maxLength: 4096
          default: null
          description: Optional IPv4 address, IPv6 address, DNS name, or normalized absolute Unix socket path. Values are trimmed; omission, null, or blank means no relay and requires relay_port 0.
        relay_port:
          type: integer
          minimum: 0
          maximum: 65535
          default: 0
          description: Port 1 through 65535 for a network relay, 0 for a Unix socket relay, and 0 when relay_host is omitted, null, or blank. POST omission creates no relay; this full-replacement request clears an existing relay when omitted.
    SchedulePatchRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
          description: New schedule comment. Blank comments clear the comment after trimming.
        timezone:
          type: string
          maxLength: 256
          description: New schedule timezone. Blank values preserve the existing timezone.
        icalendar:
          type: string
          minLength: 1
          maxLength: 32768
          description: New iCalendar content. CRLF, LF, and tab folding are accepted; other control characters are rejected.
    ScanConfigPatchRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
        family_selection:
          $ref: '#/components/schemas/ScanConfigFamilySelectionPatch'
        preferences:
          type: array
          minItems: 1
          maxItems: 512
          description: Atomic preference override mutations. Omit a redacted password/file preference to preserve its current value; use set only with a new write-only value. Reset removes the config override and restores the current feed default.
          items:
            $ref: '#/components/schemas/ScanConfigPreferenceMutation'
    ScanConfigPreferenceMutation:
      type: object
      additionalProperties: false
      required:
        - scope
        - name
        - action
      properties:
        scope:
          type: string
          enum: [scanner, nvt]
        name:
          type: string
          minLength: 1
          maxLength: 4096
        action:
          type: string
          enum: [set, reset]
          description: Set requires value. Reset forbids value and deletes the override.
        value:
          type: string
          maxLength: 196608
          x-yafvs-max-bytes: 196608
          writeOnly: true
          description: New scalar, radio, password, or file value, bounded to 196608 UTF-8 bytes. The service never echoes password/file values.
        nvt:
          $ref: '#/components/schemas/ScanConfigPreferenceNvtIdentity'
      description: Scanner mutations omit nvt. NVT mutations require the exact current feed-owned OID, preference id, type, and name identity.
    ScanConfigPreferenceNvtIdentity:
      type: object
      additionalProperties: false
      required:
        - oid
        - id
        - type
      properties:
        oid:
          type: string
          pattern: '^[0-9]+(?:\.[0-9]+)+$'
          maxLength: 128
        id:
          type: integer
          minimum: 0
        type:
          type: string
          minLength: 1
          maxLength: 128
          x-yafvs-max-bytes: 128
    ScanConfigFamilySelectionPatch:
      type: object
      additionalProperties: false
      required:
        - families_growing
        - families
      description: Complete, transaction-time scan-config family snapshot. Every current nonempty, non-Credentials feed family must appear exactly once. selected=true selects every current family NVT; selected=false retains an existing partial selection, except an all-selected family becomes empty. Whole-only families accept only growing-all or static-empty.
      properties:
        families_growing:
          type: boolean
          description: Whether newly introduced feed families are selected automatically.
        families:
          type: array
          maxItems: 512
          items:
            $ref: '#/components/schemas/ScanConfigFamilySelectionItem'
    ScanConfigFamilySelectionItem:
      type: object
      additionalProperties: false
      required:
        - name
        - growing
        - selected
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        growing:
          type: boolean
          description: Whether future NVTs in this family join the retained selection.
        selected:
          type: boolean
          description: Select all current family NVTs when true; preserve a current partial selection when false, except an all-selected family becomes empty.
    ScanConfigCreateRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - base_scan_config_id
      description: Create a new operator-owned non-predefined scan config by copying an existing base config. This intentionally excludes import/XML create, blank scanner-id create, and preference or selector mutation payloads.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        base_scan_config_id:
          type: string
          format: uuid
        comment:
          type: string
          maxLength: 4096
    HostCreateRequest:
      type: object
      additionalProperties: false
      required:
        - name
      description: Create a manual operator-owned host asset from an IPv4 or IPv6 address. This intentionally excludes hostname/MAC/OS identifier creation and report-derived host creation.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
          description: IPv4 or IPv6 address for the manual host asset.
        comment:
          type: string
          maxLength: 4096
    HostPatchRequest:
      type: object
      additionalProperties: false
      required:
        - comment
      properties:
        comment:
          type: string
          maxLength: 4096
    ScanConfigCloneRequest:
      type: object
      additionalProperties: false
      description: Optional explicit name and comment for a cloned scan config. Empty object uses the inherited-style unique Clone name and copies the source comment.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 4096
        comment:
          type: string
          maxLength: 4096
    DiagnosticNvtSelectionRequest:
      type: object
      additionalProperties: false
      required: [nvt_id]
      properties:
        nvt_id:
          type: string
          minLength: 3
          maxLength: 128
          pattern: '^[0-9]+(?:\.[0-9]+)+$'
          description: Numeric dotted NVT OID to select for diagnostic scanning.
    ScanConfigFamilyNvtsPatchRequest:
      type: object
      additionalProperties: false
      required: [changes]
      properties:
        changes:
          type: array
          minItems: 1
          maxItems: 1024
          items:
            $ref: '#/components/schemas/ScanConfigFamilyNvtSelectionChange'
    ScanConfigFamilyNvtSelectionChange:
      type: object
      additionalProperties: false
      required: [oid, selected]
      properties:
        oid:
          type: string
          minLength: 3
          maxLength: 128
          pattern: '^[0-9]+(?:\.[0-9]+)+$'
