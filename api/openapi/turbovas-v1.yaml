openapi: 3.1.0
info:
  title: TurboVAS Native API
  version: 0.1.0-contract
  description: Read-only contract baseline for DB-backed TurboVAS product workflows.
servers:
  - url: /api/v1
security:
  - operatorSession: []
paths:
  /results:
    get:
      summary: List top-level scan results
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Result collection across raw scan reports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultCollection'
  /vulnerabilities:
    get:
      summary: List top-level vulnerabilities from scan results
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Vulnerability collection aggregated from positive-severity raw scan results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnerabilityCollection'
  /operating-systems:
    get:
      summary: List top-level operating-system assets
      description: Inherited asset view backed by gvmd/PostgreSQL operating-system evidence, distinct from report operating-system evidence tabs.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Operating-system asset collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatingSystemAssetCollection'
  /reports:
    get:
      summary: List raw scan reports
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportCollection'
  /reports/{report_id}:
    get:
      summary: Read one raw scan report summary
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Raw report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
  /reports/{report_id}/results:
    get:
      summary: List raw scan report results
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report result collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultCollection'
  /reports/{report_id}/hosts:
    get:
      summary: List raw scan report hosts
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report host collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportHostCollection'
  /reports/{report_id}/ports:
    get:
      summary: List raw scan report ports
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report port collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortCollection'
  /reports/{report_id}/applications:
    get:
      summary: List raw scan report applications
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report application collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationCollection'
  /reports/{report_id}/operating-systems:
    get:
      summary: List raw scan report operating systems
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report operating system collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatingSystemCollection'
  /reports/{report_id}/cves:
    get:
      summary: List raw scan report CVEs
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report CVE collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CveCollection'
  /reports/{report_id}/tls-certificates:
    get:
      summary: List raw scan report TLS certificates
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report TLS certificate collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TlsCertificateCollection'
  /reports/{report_id}/errors:
    get:
      summary: List raw scan report Error Messages
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Raw report Error Message collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageCollection'
  /reports/{report_id}/metrics:
    get:
      summary: Read raw report metrics
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: CVSS Load and authenticated coverage metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportMetrics'
  /scopes:
    get:
      summary: List scopes
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopeCollection'
  /scopes/{scope_id}:
    get:
      summary: Read one scope
      parameters:
        - $ref: '#/components/parameters/ScopeId'
      responses:
        '200':
          description: Scope detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scope'
  /targets:
    get:
      summary: List scan targets
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Target collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetCollection'
  /targets/{target_id}:
    get:
      summary: Read one scan target summary
      parameters:
        - $ref: '#/components/parameters/TargetId'
      responses:
        '200':
          description: Target detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Target'
  /tasks:
    get:
      summary: List scan tasks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Task collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCollection'
  /tasks/{task_id}:
    get:
      summary: Read one scan task summary
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /scope-reports:
    get:
      summary: List generated scope reports
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopeReportCollection'
  /scopes/{scope_id}/reports/{scope_report_id}:
    get:
      summary: Read one scope report
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
      responses:
        '200':
          description: Scope report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScopeReport'
  /scopes/{scope_id}/reports/{scope_report_id}/results:
    get:
      summary: List deduplicated scope report results
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report result collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultCollection'
  /scopes/{scope_id}/reports/{scope_report_id}/hosts:
    get:
      summary: List scope report hosts
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report host collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostCollection'
  /scopes/{scope_id}/reports/{scope_report_id}/ports:
    get:
      summary: List scope report ports
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report port collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortCollection'
  /scopes/{scope_id}/reports/{scope_report_id}/applications:
    get:
      summary: List scope report applications
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report application collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationCollection'
  /scopes/{scope_id}/reports/{scope_report_id}/operating-systems:
    get:
      summary: List scope report operating systems
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report operating system collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatingSystemCollection'
  /scopes/{scope_id}/reports/{scope_report_id}/cves:
    get:
      summary: List scope report CVEs
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report CVE collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CveCollection'
  /scopes/{scope_id}/reports/{scope_report_id}/tls-certificates:
    get:
      summary: List scope report TLS certificates
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report TLS certificate collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TlsCertificateCollection'
  /scopes/{scope_id}/reports/{scope_report_id}/errors:
    get:
      summary: List scope report Error Messages
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Scope report Error Message collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageCollection'
  /scopes/{scope_id}/reports/{scope_report_id}/metrics:
    get:
      summary: Read scope report metrics
      parameters:
        - $ref: '#/components/parameters/ScopeId'
        - $ref: '#/components/parameters/ScopeReportId'
      responses:
        '200':
          description: CVSS Load and authenticated coverage metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportMetrics'
components:
  securitySchemes:
    operatorSession:
      type: apiKey
      in: cookie
      name: turbovas_session
      description: Placeholder for the authenticated same-origin operator session.
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    Sort:
      name: sort
      in: query
      schema:
        type: string
    Filter:
      name: filter
      in: query
      schema:
        type: string
    ReportId:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScopeId:
      name: scope_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScopeReportId:
      name: scope_report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TargetId:
      name: target_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    PageInfo:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        sort:
          type: string
        filter:
          type: string
    ReportCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Report'
    ScopeCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Scope'
    ScopeReportCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScopeReport'
    TargetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Target'
    TaskCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
    ResultCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Result'
    VulnerabilityCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Vulnerability'
    ReportHostCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportHost'
    HostCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Host'
    PortCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Port'
    ApplicationCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Application'
    OperatingSystemCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OperatingSystem'
    OperatingSystemAssetCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OperatingSystemAsset'
    CveCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Cve'
    TlsCertificateCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TlsCertificate'
    ErrorMessageCollection:
      type: object
      required: [page, items]
      properties:
        page:
          $ref: '#/components/schemas/PageInfo'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ErrorMessage'
    Report:
      type: object
      required: [id, name, status, result_count, vulnerability_count, host_count, cve_count, severity, max_severity]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        task:
          $ref: '#/components/schemas/ReportReference'
        target:
          $ref: '#/components/schemas/ReportReference'
        creation_time:
          type: string
          format: date-time
        modification_time:
          type: string
          format: date-time
        scan_start:
          type: string
          format: date-time
        scan_end:
          type: string
          format: date-time
        severity:
          $ref: '#/components/schemas/ReportSeverityCounts'
        max_severity:
          type: number
        result_count:
          type: integer
        vulnerability_count:
          type: integer
        host_count:
          type: integer
        cve_count:
          type: integer
    ReportReference:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    ReportSeverityCounts:
      type: object
      required: [critical, high, medium, low, log, false_positive]
      properties:
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        log:
          type: integer
        false_positive:
          type: integer
    Scope:
      type: object
      required: [id, name, protection_requirement, protection_requirement_label, predefined, global, target_count, host_count, scope_report_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        comment:
          type: string
        protection_requirement:
          enum: [normal, high, very_high]
        protection_requirement_label:
          enum: [Normal, High, Very High]
        predefined:
          type: boolean
        global:
          type: boolean
        creation_time:
          type: string
          format: date-time
        modification_time:
          type: string
          format: date-time
        target_count:
          type: integer
        host_count:
          type: integer
        scope_report_count:
          type: integer
        targets:
          type: array
          items:
            $ref: '#/components/schemas/ScopeEntity'
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/ScopeEntity'
        candidate_hosts:
          type: array
          items:
            $ref: '#/components/schemas/ScopeCandidateHost'
        scope_reports:
          type: array
          items:
            $ref: '#/components/schemas/ScopeReportReference'
    ScopeEntity:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    ScopeCandidateHost:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        target_id:
          type: string
          format: uuid
        target_name:
          type: string
        source_report_id:
          type: string
          format: uuid
    ScopeReportReference:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        creation_time:
          type: string
          format: date-time
        latest_evidence_time:
          type: string
          format: date-time
        source_report_count:
          type: integer
        member_host_count:
          type: integer
        evidence_host_count:
          type: integer
        missing_host_count:
          type: integer
        result_count:
          type: integer
        vulnerability_count:
          type: integer
        max_severity:
          type: number
    ScopeReport:
      type: object
      required: [id, name, status, scope, source_report_count, result_count, vulnerability_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        scope:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        protection_requirement:
          enum: [Normal, High, Very High]
        source_report_count:
          type: integer
        source_target_count:
          type: integer
