        items:
          type: array
          items:
            $ref: '#/components/schemas/FeedItem'
    FeedCurrentlySyncing:
      type: object
      properties:
        timestamp:
          type: string
          description: Timestamp text read from the inherited feed lock file when a sync/update lock is active.
    FeedSyncNotAvailable:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Safe operator-facing diagnostic when metadata or synchronization state cannot be read.
    FeedItem:
      type: object
      required: [name, version, type, status, sync_status, metadata_source, status_source]
      properties:
        name:
          type: string
        version:
          type: string
        type:
          type: string
          enum: [NVT, SCAP, CERT, GVMD_DATA]
        status:
          type: string
          enum: [Up-to-date..., Update in progress..., Unknown]
          description: Compatibility status string for the inherited list-feeds table contract.
        sync_status:
          type: string
          enum: [up_to_date, syncing, unknown]
        currently_syncing:
          $ref: '#/components/schemas/FeedCurrentlySyncing'
        sync_not_available:
