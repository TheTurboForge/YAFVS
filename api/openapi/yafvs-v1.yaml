          $ref: '#/components/schemas/LdapAuthenticationSettings'
        radius:
          $ref: '#/components/schemas/RadiusAuthenticationSettings'
    LdapAuthenticationSettings:
      type: object
      additionalProperties: false
      required: [available, enabled, host, auth_dn, allow_plaintext, ldaps_only, certificate]
      properties:
        available:
          type: boolean
        enabled:
          type: boolean
        host:
          type: string
          maxLength: 1024
          description: LDAP provider host, limited to 1024 UTF-8 bytes without control characters.
        auth_dn:
          type: string
          maxLength: 4096
          description: LDAP authentication DN, limited to 4096 UTF-8 bytes without control characters.
        allow_plaintext:
          type: boolean
        ldaps_only:
          type: boolean
        certificate:
          oneOf:
            - $ref: '#/components/schemas/LdapCertificateMetadata'
            - type: 'null'
          description: Redacted stored CA certificate metadata, or null when no certificate is stored. Certificate content is never returned.
    LdapCertificateMetadata:
      type: object
      additionalProperties: false
      required: [sha256_fingerprint, issuer, activation_time, expiration_time, time_status]
      properties:
        sha256_fingerprint:
          type: [string, 'null']
          maxLength: 256
        issuer:
          type: [string, 'null']
          maxLength: 4096
        activation_time:
          type: [string, 'null']
          format: date-time
          maxLength: 128
        expiration_time:
          type: [string, 'null']
          format: date-time
          maxLength: 128
        time_status:
          type: [string, 'null']
          maxLength: 128
    RadiusAuthenticationSettings:
      type: object
      additionalProperties: false
      required: [available, enabled, host, secret_configured]
      properties:
        available:
          type: boolean
        enabled:
          type: boolean
        host:
          type: string
          maxLength: 1024
          description: RADIUS provider host, limited to 1024 UTF-8 bytes without control characters.
        secret_configured:
          type: boolean
          description: True when a RADIUS shared secret is stored. The secret is never returned.
    LdapAuthenticationSettingsUpdateRequest:
      type: object
      additionalProperties: false
      required: [enabled, host, auth_dn, allow_plaintext, ldaps_only]
      properties:
        enabled:
          type: boolean
        host:
          type: string
          maxLength: 1024
          description: Complete LDAP host snapshot, limited to 1024 UTF-8 bytes without control characters.
        auth_dn:
          type: string
          maxLength: 4096
          description: Complete LDAP authentication DN snapshot, limited to 4096 UTF-8 bytes without control characters.
        allow_plaintext:
          type: boolean
        ldaps_only:
          type: boolean
        ca_certificate_pem:
          type: string
          minLength: 1
          maxLength: 32768
          writeOnly: true
          description: Optional replacement PEM certificate, limited to 32768 UTF-8 bytes. Omission preserves the stored certificate.
    RadiusAuthenticationSettingsUpdateRequest:
      type: object
      additionalProperties: false
      required: [enabled, host]
      properties:
        enabled:
          type: boolean
        host:
          type: string
          maxLength: 1024
          description: Complete RADIUS host snapshot, limited to 1024 UTF-8 bytes without control characters.
        secret:
          type: string
          minLength: 1
          maxLength: 4096
          writeOnly: true
          description: Optional replacement RADIUS shared secret, limited to 4096 UTF-8 bytes without control characters. Omission preserves the stored secret.
    UserManagementCollection:
      type: object
      required: [page, items]
