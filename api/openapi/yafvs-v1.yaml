          $ref: '#/components/responses/InternalError'
  /trashcan/empty:
    post:
      operationId: postTrashcanEmpty
      x-yafvs-direct: true
      x-yafvs-exposure: direct-write
      x-yafvs-profile: shared-write
      x-yafvs-maturity: live-write
      x-yafvs-replaces: trashcan-empty
      x-yafvs-inherited-still-owns: trashcan-row-detail-restore-and-individual-hard-delete
      x-yafvs-operator-identity: resolved-request-operator
      x-yafvs-owner-semantics: request-operator-owner
      x-yafvs-safety-contract: write-control-v1
      x-yafvs-side-effect: permanent-deletion
      summary: Permanently empty the operator Trashcan
      description: Permanently deletes the authenticated operator's Trashcan through gvmd's private authoritative control path. The caller must explicitly acknowledge permanent deletion and provide the total and SHA-256 identity digest from a fresh empty preview. A changed total or resource identity set is rejected with 409 before deletion. The direct bearer path requires configured write control and a bound operator identity; the same-origin browser path resolves the operator from authenticated internal proxy headers. A 502 mutation_outcome_indeterminate response means the request may have committed, including when gvmd reports an error after non-transactional report-format filesystem work; verify current state and obtain a new preview before any retry.
      security:
        - operatorSession: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrashEmptyRequest'
      responses:
        '200':
          description: Operator Trashcan permanently emptied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrashEmptyResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          $ref: '#/components/responses/RequestTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
        '502':
          description: The mutation may have committed without a complete authoritative response, or gvmd reported an error after potentially changing report-format filesystem state. Verify current state and obtain a new preview before retrying.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
