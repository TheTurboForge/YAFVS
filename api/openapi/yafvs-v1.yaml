      description: Atomically replaces any human-owned alert with a strict Task run status changed, Always, no-filter EMAIL, SMB, SYSLOG, SNMP, SCP, or START_TASK definition. Any authenticated stack operator may continue this work; the alert's existing owner remains attribution. The required opaque expected_revision prevents a stale editor from overwriting a newer definition. The transaction locks the operator/name namespace, target alert, and every referenced human-owned credential or task plus the selected report format before deleting and reinserting the fixed definition. Unknown method fields are rejected and SQL is prepared and parameterized. SNMP requires snmp_community_mode preserve or replace. Preserve is valid only when the target is already SNMP with exactly one nonempty community row and retains that row without selecting its value; replace requires a bounded nonempty write-only community. Other alert methods, events, conditions, and filter-backed semantics are intentionally not retained. A 502 mutation_outcome_indeterminate response means commit acknowledgement failed and current state must be checked before retrying. A 502 committed_response_unavailable response means commit succeeded but the authoritative response reload failed.
