      additionalProperties: false
      required: [name, auth_method]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: Operator login name, limited to 256 UTF-8 bytes and no control characters.
        comment:
          type: string
          maxLength: 4096
          default: ''
          description: Account comment, limited to 4096 UTF-8 bytes and no control characters.
        auth_method:
          type: string
          enum: [password, ldap, radius]
        password:
          type: string
          minLength: 1
          maxLength: 4096
          writeOnly: true
          description: Required for new password-authenticated accounts and when changing an external account to password authentication; otherwise optional and never returned.
    UserSettingCollection:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserSetting'
    UserSetting:
      type: object
